<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Mission Planner">
<meta name="theme-color" content="#534AB7">
<title>Mission Planner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
:root{--bg:#fff;--bg2:#f5f5f7;--bg3:#e8e8ed;--tx:#1d1d1f;--tx2:#6e6e73;--tx3:#98989d;--bd:#d2d2d7;--bd2:#c7c7cc;--ac:#534AB7;--ac2:#3C3489;--r:8px;--rl:12px;}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--tx:#f2f2f7;--tx2:#aeaeb2;--tx3:#636366;--bd:#38383a;--bd2:#48484a;}}
html,body{height:100%;overflow:hidden;background:var(--bg3);}
#app{display:flex;flex-direction:column;height:100vh;}
#topbar{display:flex;align-items:center;gap:7px;padding:9px 14px;background:var(--bg2);border-bottom:0.5px solid var(--bd);flex-shrink:0;}
.app-icon{width:24px;height:24px;background:var(--ac);border-radius:6px;color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;}
#cal-title{font-size:14px;font-weight:500;color:var(--tx);flex:1;}
.vbtns{display:flex;gap:2px;background:var(--bg3);border-radius:var(--r);padding:2px;}
.vbtn{padding:4px 10px;font-size:11px;border:none;background:none;cursor:pointer;border-radius:6px;color:var(--tx2);}
.vbtn.on{background:var(--bg);color:var(--tx);font-weight:500;}
.tbtn{padding:5px 10px;font-size:12px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg);cursor:pointer;color:var(--tx2);}
.today-btn{background:var(--ac);color:#fff;border-color:var(--ac);}
.navbtn{padding:3px 8px;font-size:16px;background:none;border:none;cursor:pointer;color:var(--tx2);}
#sync-lbl{font-size:11px;min-width:68px;text-align:right;color:var(--tx3);}
#gp{background:var(--bg);border-bottom:0.5px solid var(--bd);flex-shrink:0;}
.gp-hdr{display:flex;align-items:center;gap:7px;padding:5px 14px;border-bottom:0.5px solid var(--bd);}
.gp-lbl{font-size:10px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;flex:1;}
.ztb{padding:3px 8px;font-size:10px;border-radius:20px;border:0.5px solid var(--bd2);background:var(--bg);cursor:pointer;color:var(--tx2);}
.ztb.on{color:#fff;border-color:transparent;}
.ztb[data-z=mission].on{background:#534AB7;}.ztb[data-z=life].on{background:#0F6E56;}.ztb[data-z=yearly].on{background:#BA7517;}.ztb[data-z=monthly].on{background:#185FA5;}.ztb[data-z=weekly].on{background:#993C1D;}
.g-rows{display:flex;gap:6px;padding:6px 14px;overflow-x:auto;}
.glane{min-width:115px;flex:1;background:var(--bg2);border-radius:var(--r);overflow:hidden;border:0.5px solid var(--bd);}
.glane.hidden{display:none;}
.gl-hdr{padding:4px 7px;font-size:10px;font-weight:500;display:flex;align-items:center;justify-content:space-between;}
.gl-hdr[data-z=mission]{background:#EEEDFE;color:#3C3489;}.gl-hdr[data-z=life]{background:#E1F5EE;color:#085041;}.gl-hdr[data-z=yearly]{background:#FAEEDA;color:#633806;}.gl-hdr[data-z=monthly]{background:#E6F1FB;color:#0C447C;}.gl-hdr[data-z=weekly]{background:#FAECE7;color:#712B13;}
.gl-addbtn{background:none;border:none;cursor:pointer;font-size:15px;opacity:.6;line-height:1;color:inherit;}
.gl-items{padding:3px;display:flex;flex-direction:column;gap:2px;min-height:28px;}
.gl-item{padding:3px 6px;font-size:11px;background:var(--bg);border-radius:4px;border:0.5px solid var(--bd);cursor:grab;display:flex;align-items:center;gap:3px;user-select:none;}
.gl-item.drag{opacity:.25;}.gl-item span{flex:1;color:var(--tx);}
.gl-del{background:none;border:none;cursor:pointer;font-size:11px;opacity:0;color:var(--tx2);}
.gl-item:hover .gl-del{opacity:.7;}
.gl-inp{width:100%;padding:3px 6px;font-size:11px;border:none;background:var(--bg);color:var(--tx);outline:none;border-radius:4px;}
.gdz.over{background:rgba(83,74,183,.1);}
#main{display:flex;flex:1;overflow:hidden;min-height:0;}
#sidebar{width:196px;flex-shrink:0;border-right:0.5px solid var(--bd);display:flex;flex-direction:column;background:var(--bg2);}
.mini-cal{padding:9px 10px;}
.mini-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.mini-title{font-size:12px;font-weight:500;color:var(--tx);}
.mini-nav{background:none;border:none;cursor:pointer;font-size:12px;color:var(--tx2);padding:2px 4px;}
.mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
.mini-dh{font-size:9px;color:var(--tx3);text-align:center;padding:2px 0;}
.mini-d{font-size:10px;text-align:center;border-radius:50%;cursor:pointer;color:var(--tx2);width:23px;height:23px;display:flex;align-items:center;justify-content:center;margin:auto;}
.mini-d:hover{background:var(--bg);}.mini-d.tod{background:var(--ac);color:#fff;}.mini-d.sel{background:rgba(83,74,183,.15);color:var(--ac);font-weight:500;}.mini-d.om{opacity:.28;}.mini-d.hol{color:#E24B4A;}
.sb-sec{padding:6px 10px;border-top:0.5px solid var(--bd);}
.sb-ttl{font-size:10px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.cal-item{display:flex;align-items:center;gap:7px;padding:3px 0;font-size:11px;color:var(--tx2);cursor:pointer;}
.cal-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.cal-item.off .cal-dot{opacity:.3;}.cal-item.off span{opacity:.35;}
#content{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--bg);min-width:0;}
.mv{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.mv-dow{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:0.5px solid var(--bd);flex-shrink:0;}
.mv-dow div{font-size:10px;color:var(--tx2);text-align:center;padding:5px 0;}
.mv-dow div:first-child{color:#E24B4A;}.mv-dow div:last-child{color:#185FA5;}
.mv-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:repeat(6,1fr);flex:1;}
.mc{border-right:0.5px solid var(--bd);border-bottom:0.5px solid var(--bd);padding:3px;cursor:pointer;overflow:hidden;}
.mc:nth-child(7n){border-right:none;}.mc:hover{background:var(--bg2);}
.mc-n{font-size:11px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:1px;color:var(--tx2);}
.mc-n.tod{background:var(--ac);color:#fff;font-weight:500;}.mc-n.om{opacity:.3;}.mc-n.sun,.mc-n.hol{color:#E24B4A;}.mc-n.sat{color:#185FA5;}
.mc-hol{font-size:9px;color:#E24B4A;margin-bottom:1px;}
.mc-ev{font-size:10px;padding:1px 4px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
.wv{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.wv-hdr{display:grid;grid-template-columns:48px repeat(7,1fr);border-bottom:0.5px solid var(--bd);flex-shrink:0;}
.wh-sp{border-right:0.5px solid var(--bd);}
.wh-day{text-align:center;padding:5px 2px;border-right:0.5px solid var(--bd);cursor:pointer;}
.wh-day:hover{background:var(--bg2);}
.wh-dn{font-size:10px;color:var(--tx2);}.wh-num{font-size:17px;font-weight:300;color:var(--tx2);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;margin:2px auto 0;}
.wh-num.tod{background:var(--ac);color:#fff;}
.wv-body{flex:1;overflow-y:auto;display:grid;grid-template-columns:48px repeat(7,1fr);}
.wt-col{border-right:0.5px solid var(--bd);}
.wt-h{height:52px;padding:3px 5px 0;font-size:10px;color:var(--tx3);text-align:right;}
.we-col{border-right:0.5px solid var(--bd);position:relative;}
.we-slot{height:52px;border-bottom:0.5px solid rgba(0,0,0,.04);cursor:pointer;}
.we-slot:hover{background:var(--bg2);}
.we-ev{position:absolute;left:2px;right:2px;border-radius:4px;padding:2px 5px;font-size:10px;overflow:hidden;cursor:pointer;z-index:2;border-left:3px solid;}
/* DAILY */
.dv{flex:1;display:flex;overflow:hidden;min-height:0;}
.tp{width:160px;flex-shrink:0;border-right:0.5px solid var(--bd);display:flex;flex-direction:column;background:var(--bg);overflow:hidden;}
.tp-hdr{padding:8px 10px;font-size:12px;font-weight:500;color:var(--tx);border-bottom:0.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.tp-cnt{font-size:10px;color:var(--tx3);font-weight:400;}
.tp-list{flex:1;overflow-y:auto;padding:5px;}
.tchip{padding:6px 7px;font-size:11px;border-radius:var(--r);border:0.5px solid var(--bd);background:var(--bg2);display:flex;align-items:center;gap:4px;margin-bottom:3px;user-select:none;}
.tchip.draggable{cursor:grab;}.tchip.placed{opacity:.32;text-decoration:line-through;}.tchip.dragging{opacity:.15;}
.cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.tp-add{padding:5px;border-top:0.5px solid var(--bd);display:flex;gap:3px;flex-shrink:0;background:var(--bg);}
.tp-add input{flex:1;min-width:0;padding:6px 6px;font-size:12px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--tx);outline:none;}
.tp-add input:focus{border-color:var(--ac);}
.tp-add button{width:30px;height:30px;font-size:18px;font-weight:700;background:var(--ac);color:#fff;border:none;border-radius:var(--r);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.tp-add button:hover{background:var(--ac2);}
.tbp{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.tbp-hdr{padding:8px 12px;font-size:12px;font-weight:500;color:var(--tx);border-bottom:0.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.tbp-date{font-size:11px;color:var(--tx2);font-weight:400;}
.ev-bar{padding:4px 10px;border-bottom:0.5px solid var(--bd);background:var(--bg2);display:flex;flex-wrap:wrap;gap:4px;align-items:center;min-height:32px;flex-shrink:0;}
.ev-pill{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;font-size:11px;border-radius:20px;cursor:pointer;}
/* TIMEBOX — single scrollable column, blocks drawn inside */
.tbx-outer{flex:1;overflow-y:auto;position:relative;}
.tbx-inner{position:relative;} /* height set by JS = 24*HPXH */
.hr-line{position:absolute;left:0;right:0;display:flex;pointer-events:none;}
.hr-label{width:52px;font-size:10px;color:var(--tx3);padding:0 6px;flex-shrink:0;text-align:right;}
.hr-tick{flex:1;border-top:0.5px solid rgba(0,0,0,.07);}
/* Drag target overlay — full height, captures drops */
.tbx-drop{position:absolute;top:0;left:52px;right:0;bottom:0;z-index:1;}
.tbx-drop.over{background:rgba(83,74,183,.05);}
/* Task blocks */
.tblock{position:absolute;left:54px;right:4px;border-radius:6px;padding:4px 7px;z-index:5;box-shadow:0 1px 3px rgba(0,0,0,.1);}
.tblock-top{display:flex;align-items:center;gap:4px;}
.tblock-bot{display:flex;align-items:center;gap:4px;margin-top:3px;}
.dur-ctrl{display:flex;gap:2px;align-items:center;margin-left:auto;}
.dur-btn{width:20px;height:20px;border-radius:4px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;border:none;}
.dur-btn:disabled{opacity:.25;cursor:default;}
.rm-btn{background:none;border:none;cursor:pointer;font-size:12px;opacity:.4;line-height:1;padding:0;}
.rm-btn:hover{opacity:1;}
/* Event blocks in timebox */
.ev-block{position:absolute;left:54px;right:4px;border-radius:6px;padding:3px 7px;z-index:4;cursor:move;border-left:3px solid;}
#modal-root{position:fixed;inset:0;z-index:9999;pointer-events:none;}
#modal-root:not(:empty){pointer-events:all;}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;}
.modal{background:var(--bg);border-radius:var(--rl);padding:20px;width:310px;border:0.5px solid var(--bd);box-shadow:0 20px 60px rgba(0,0,0,.3);}
.modal h3{font-size:14px;font-weight:500;margin-bottom:13px;color:var(--tx);}
.modal label{font-size:11px;color:var(--tx2);display:block;margin-bottom:3px;margin-top:10px;}
.modal input[type=text],.modal input[type=date],.modal select,.modal textarea{width:100%;padding:6px 8px;font-size:12px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--tx);outline:none;}
.modal input:focus,.modal select:focus{border-color:var(--ac);}
.modal textarea{resize:none;height:52px;}
.modal-btns{display:flex;gap:6px;margin-top:13px;justify-content:flex-end;}
.mbtn{padding:7px 14px;font-size:12px;border-radius:var(--r);cursor:pointer;border:0.5px solid var(--bd2);background:var(--bg);color:var(--tx2);}
.mbtn:hover{background:var(--bg2);}
.mbtn.pri{background:var(--ac);color:#fff;border-color:var(--ac);}
.mbtn.pri:hover{background:var(--ac2);}
.mbtn.del{color:#E24B4A;border-color:rgba(226,75,74,.3);}
.cpicks{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;}
.cpick{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;}
.cpick.sel{border-color:var(--tx);}
@media print{#topbar,#gp,#sidebar{display:none!important;}#main{display:block;}#content{overflow:visible;}.mv-grid{grid-template-rows:repeat(6,110px);}}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px;}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="app-icon">M</div>
    <button class="tbtn today-btn" onclick="goToday()">오늘</button>
    <button class="navbtn" onclick="navigate(-1)">&#8249;</button>
    <button class="navbtn" onclick="navigate(1)">&#8250;</button>
    <div id="cal-title"></div>
    <div class="vbtns">
      <button class="vbtn on" onclick="setView('month',this)">월</button>
      <button class="vbtn" onclick="setView('week',this)">주</button>
      <button class="vbtn" onclick="setView('day',this)">일</button>
    </div>
    <button class="tbtn" onclick="window.print()">🖨 인쇄</button>
    <button class="tbtn" onclick="resetAllData()" style="color:#E24B4A;border-color:#E24B4A44;" title="데이터 초기화">↺</button>
    <span id="sync-lbl">로컬 저장</span>
  </div>
  <div id="gp">
    <div class="gp-hdr">
      <span class="gp-lbl">목표 계층</span>
      <div style="display:flex;gap:4px;">
        <button class="ztb on" data-z="mission" onclick="toggleZ('mission',this)">사명</button>
        <button class="ztb on" data-z="life" onclick="toggleZ('life',this)">인생</button>
        <button class="ztb on" data-z="yearly" onclick="toggleZ('yearly',this)">연간</button>
        <button class="ztb on" data-z="monthly" onclick="toggleZ('monthly',this)">월간</button>
        <button class="ztb on" data-z="weekly" onclick="toggleZ('weekly',this)">주간</button>
      </div>
    </div>
    <div class="g-rows" id="goal-rows"></div>
  </div>
  <div id="main">
    <div id="sidebar">
      <div class="mini-cal">
        <div class="mini-hdr">
          <span class="mini-title" id="mini-title"></span>
          <div>
            <button class="mini-nav" onclick="miniNav(-1)">&#8249;</button>
            <button class="mini-nav" onclick="miniNav(1)">&#8250;</button>
          </div>
        </div>
        <div class="mgrid" id="mini-grid"></div>
      </div>
      <div class="sb-sec">
        <div class="sb-ttl">캘린더</div>
        <div id="cal-list"></div>
      </div>
    </div>
    <div id="content"></div>
  </div>
</div>
<div id="modal-root"></div>
<script>
// ═══ STATE ═══════════════════════════════════════════════
var today=new Date(),cur=new Date(today),miniCur=new Date(today),selDate=new Date(today);
var view='month';
var gid=0,tid=0,eid=0,tcIdx=0;
var dragGoalZ=null,dragGoalId=null,dragEvId=null,dragEvOffsetMin=0;
var sbReady=false,sbClient=null,syncT=null;
var HPXH=64; // pixels per hour in timebox

var CALS=[
  {id:'ministry',name:'사역',color:'#534AB7',on:true},
  {id:'writing',name:'저술·연구',color:'#0F6E56',on:true},
  {id:'edu',name:'교육',color:'#185FA5',on:true},
  {id:'personal',name:'개인',color:'#993C1D',on:true},
  {id:'family',name:'가정',color:'#BA7517',on:true}
];
var EV_COLORS=['#534AB7','#0F6E56','#185FA5','#993C1D','#BA7517','#639922','#E24B4A'];
var TC=['#534AB7','#0F6E56','#993C1D','#185FA5','#BA7517','#639922'];
var goals={
  mission:[{id:'g'+(++gid),text:'하나님 나라를 위한 교육 사역자'}],
  life:[{id:'g'+(++gid),text:'목회·학문·저술의 통합된 삶'},{id:'g'+(++gid),text:'가정과 사역의 균형'}],
  yearly:[{id:'g'+(++gid),text:'감정학교 출판'},{id:'g'+(++gid),text:'박사 논문 완성'}],
  monthly:[{id:'g'+(++gid),text:'감정학교 3장 초고'}],
  weekly:[{id:'g'+(++gid),text:'주일·수요 설교 준비'},{id:'g'+(++gid),text:'유튜브 영상 1편'}]
};
var zVis={mission:true,life:true,yearly:true,monthly:true,weekly:true};
var events={};
var dailyTasks={}; // {dateKey:[{id,text,color}]}
// timeline: {dateKey:[{id,startMin,durMin}]}
var timeline={};

// ═══ HELPERS ═════════════════════════════════════════════
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function pad(n){return n<10?'0'+n:String(n);}
function dk(d){return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function isToday(d){return sameDay(d,today);}
function dfmt(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function minToStr(m){return pad(Math.floor(m/60))+':'+pad(m%60);}
function mk(tag,cls){var e=document.createElement(tag);if(cls)e.className=cls;return e;}
function syncLbl(s,c){var el=document.getElementById('sync-lbl');if(el){el.textContent=s;el.style.color=c||'var(--tx3)';}}
function getTasks(key){if(!dailyTasks[key])dailyTasks[key]=[];return dailyTasks[key];}
function pxToMin(px){return Math.round(px/HPXH*60/5)*5;}
function minToPx(m){return m/60*HPXH;}

// ═══ HOLIDAYS ════════════════════════════════════════════
var holCache={};
function buildHol(y){
  var h={};
  [[1,1,'신정'],[3,1,'삼일절'],[5,5,'어린이날'],[6,6,'현충일'],[8,15,'광복절'],[10,3,'개천절'],[10,9,'한글날'],[12,25,'크리스마스']].forEach(function(f){h[y+'-'+f[0]+'-'+f[1]]=f[2];});
  var lu={2024:{'2-11':'설날','9-17':'추석','5-15':'부처님오신날'},2025:{'1-29':'설날','10-6':'추석','5-5':'부처님오신날'},2026:{'2-17':'설날','9-25':'추석','5-24':'부처님오신날'},2027:{'2-7':'설날','9-15':'추석','5-13':'부처님오신날'}};
  if(lu[y])Object.keys(lu[y]).forEach(function(k){var p=k.split('-');h[y+'-'+p[0]+'-'+p[1]]=lu[y][k];});
  return h;
}
function getHol(d){var y=d.getFullYear();if(!holCache[y])holCache[y]=buildHol(y);return holCache[y][y+'-'+(d.getMonth()+1)+'-'+d.getDate()]||null;}

// ═══ SUPABASE ════════════════════════════════════════════
var SB_URL='https://ztkrhfiwicsvxnhojwtf.supabase.co';
var SB_KEY='sb_publishable_imk3jqivvh1lRMlWH7wcsw_3ImdI-O5';
var SB_TBL='missionplanner';
function initSB(){
  try{
    sbClient=supabase.createClient(SB_URL,SB_KEY);sbReady=true;syncLbl('연결 중...','#BA7517');
    loadSB();
    sbClient.channel('mp').on('postgres_changes',{event:'UPDATE',schema:'public',table:SB_TBL},function(p){
      if(p.new&&p.new.payload){applyData(p.new.payload);render();syncLbl('✓ 동기화됨','#0F6E56');}
    }).subscribe();
  }catch(ex){sbReady=false;syncLbl('로컬 저장','#6e6e73');}
}
async function loadSB(){
  try{
    var r=await sbClient.from(SB_TBL).select('*').eq('id','main').single();
    if(r.data&&r.data.payload)applyData(r.data.payload);
    else{loadLocal();if(!Object.keys(dailyTasks).length)initSample();}
    render();syncLbl('✓ 동기화됨','#0F6E56');
  }catch(ex){loadLocal();if(!Object.keys(dailyTasks).length)initSample();render();syncLbl('⚠ 오프라인','#E24B4A');}
}
function applyData(d){
  if(d.goals)goals=d.goals;
  if(d.events)events=d.events;
  if(d.dailyTasks){
    dailyTasks=d.dailyTasks;
  } else if(d.tasks&&d.tasks.length){
    // Migrate old global tasks to today's date only
    var todayKey=dk(today);
    if(!dailyTasks[todayKey])dailyTasks[todayKey]=[];
    // Only migrate if we don't already have tasks for today
    if(dailyTasks[todayKey].length===0){
      dailyTasks[todayKey]=d.tasks.map(function(t){return {id:t.id,text:t.text,color:t.color};});
    }
  }
  if(d.timeline)timeline=d.timeline;
  if(d.ids){gid=d.ids.gid||gid;tid=d.ids.tid||tid;eid=d.ids.eid||eid;tcIdx=d.ids.tcIdx||tcIdx;}
}
function save(){
  try{localStorage.setItem('mp_g',JSON.stringify(goals));localStorage.setItem('mp_e',JSON.stringify(events));localStorage.setItem('mp_dt',JSON.stringify(dailyTasks));localStorage.setItem('mp_tl',JSON.stringify(timeline));localStorage.setItem('mp_ids',JSON.stringify({gid:gid,tid:tid,eid:eid,tcIdx:tcIdx}));}catch(ex){}
  if(!sbReady||!sbClient)return;
  if(syncT)clearTimeout(syncT);syncLbl('저장 중...','#185FA5');
  syncT=setTimeout(async function(){
    try{var pl={goals:goals,events:events,dailyTasks:dailyTasks,timeline:timeline,ids:{gid:gid,tid:tid,eid:eid,tcIdx:tcIdx}};var r=await sbClient.from(SB_TBL).upsert({id:'main',payload:pl},{onConflict:'id'});if(r.error)throw r.error;syncLbl('✓ 동기화됨','#0F6E56');}
    catch(ex){syncLbl('⚠ 오프라인','#E24B4A');}
  },700);
}
function loadLocal(){
  try{
    var g=localStorage.getItem('mp_g');if(g)goals=JSON.parse(g);
    var e=localStorage.getItem('mp_e');if(e)events=JSON.parse(e);
    var dt=localStorage.getItem('mp_dt');if(dt)dailyTasks=JSON.parse(dt);
    var tl=localStorage.getItem('mp_tl');if(tl)timeline=JSON.parse(tl);
    var ids=localStorage.getItem('mp_ids');if(ids){var o=JSON.parse(ids);gid=o.gid||gid;tid=o.tid||tid;eid=o.eid||eid;tcIdx=o.tcIdx||tcIdx;}
    // Clear old global tasks key to prevent confusion
    localStorage.removeItem('mp_t');}catch(ex){}
}
function initSample(){
  var y=today.getFullYear(),m=today.getMonth();
  function ae(d,title,calId,h,dur){var key=y+'-'+(m+1)+'-'+d;if(!events[key])events[key]=[];var c=CALS.find(function(x){return x.id===calId;})||CALS[0];events[key].push({id:'e'+(++eid),title:title,hour:h,min:0,durMin:dur*60,note:'',calId:calId,color:c.color});}
  ae(today.getDate(),'주일 설교 준비','ministry',9,2);ae(today.getDate(),'감정학교 원고','writing',14,2);ae(today.getDate()+1,'수요 예배','ministry',19,2);
  var sk=dk(today);if(!dailyTasks[sk])dailyTasks[sk]=[];[{t:'설교 본문 묵상',c:TC[0]},{t:'감정학교 원고',c:TC[1]},{t:'박사 논문 리뷰',c:TC[2]},{t:'유튜브 스크립트',c:TC[3]},{t:'이메일 답장',c:TC[4]}].forEach(function(x){dailyTasks[sk].push({id:'t'+(++tid),text:x.t,color:x.c});});tcIdx=5;
}

function toggleZ(z,btn){zVis[z]=!zVis[z];btn.classList.toggle('on',zVis[z]);renderGoals();}
function renderGoals(){
  var rows=document.getElementById('goal-rows');rows.innerHTML='';
  var zones=['mission','life','yearly','monthly','weekly'];
  var labels={mission:'Life Mission',life:'Life Goals',yearly:'Yearly Goals',monthly:'Monthly Goals',weekly:'Weekly Goals'};
  zones.forEach(function(z){
    var lane=mk('div','glane'+(zVis[z]?'':' hidden'));
    var hdr=mk('div','gl-hdr');hdr.dataset.z=z;
    var sp=mk('span');sp.textContent=labels[z];hdr.appendChild(sp);
    var ab=mk('button','gl-addbtn');ab.type='button';ab.textContent='+';ab.addEventListener('click',function(){startAddGoal(z);});hdr.appendChild(ab);lane.appendChild(hdr);
    var items=mk('div','gl-items gdz');items.id='gl-'+z;
    items.addEventListener('dragover',function(e){e.preventDefault();items.classList.add('over');});
    items.addEventListener('dragleave',function(){items.classList.remove('over');});
    items.addEventListener('drop',function(e){e.preventDefault();items.classList.remove('over');if(!dragGoalId)return;var src=dragGoalZ;if(src===z)return;var item=goals[src].find(function(g){return g.id===dragGoalId;});if(!item)return;goals[src]=goals[src].filter(function(g){return g.id!==dragGoalId;});goals[z].push(item);dragGoalId=null;save();renderGoals();});
    goals[z].forEach(function(g){
      var d=mk('div','gl-item');d.draggable=true;
      var s=mk('span');s.textContent=g.text;
      var dl=mk('button','gl-del');dl.type='button';dl.textContent='✕';dl.addEventListener('click',function(e){e.stopPropagation();goals[z]=goals[z].filter(function(x){return x.id!==g.id;});save();renderGoals();});
      d.appendChild(s);d.appendChild(dl);
      d.addEventListener('dragstart',function(e){dragGoalZ=z;dragGoalId=g.id;e.dataTransfer.setData('text/plain','goal:'+g.id);setTimeout(function(){d.classList.add('drag');},0);});
      d.addEventListener('dragend',function(){d.classList.remove('drag');dragGoalId=null;});
      items.appendChild(d);
    });
    lane.appendChild(items);rows.appendChild(lane);
  });
}
function startAddGoal(z){var items=document.getElementById('gl-'+z);if(!items)return;var inp=mk('input','gl-inp');inp.placeholder='입력 후 Enter...';inp.addEventListener('keydown',function(e){if(e.key==='Enter'){var t=inp.value.trim();if(t){goals[z].push({id:'g'+(++gid),text:t});save();}renderGoals();}if(e.key==='Escape')renderGoals();});inp.addEventListener('blur',function(){setTimeout(renderGoals,150);});items.appendChild(inp);inp.focus();}

// ═══ EVENT MODAL ═════════════════════════════════════════
var _sc='#534AB7';
function openEvModal(o){
  o=o||{};_sc=o.color||(CALS.find(function(c){return c.id===(o.calId||'ministry');})||CALS[0]).color;
  var calOpts=CALS.map(function(c){return '<option value="'+c.id+'"'+(o.calId===c.id?' selected':'')+'>'+c.name+'</option>';}).join('');
  var picks=EV_COLORS.map(function(c){return '<div class="cpick'+(c===_sc?' sel':'')+'" style="background:'+c+'" onclick="pickCol(\''+c+'\')" data-c="'+c+'"></div>';}).join('');
  var hOpts='';for(var hi=0;hi<24;hi++)hOpts+='<option value="'+hi+'"'+(hi===(o.hour||0)?' selected':'')+'>'+pad(hi)+'시</option>';
  var mOpts=[0,5,10,15,20,25,30,35,40,45,50,55].map(function(mi){return '<option value="'+mi+'"'+(mi===(o.min||0)?' selected':'')+'>'+pad(mi)+'분</option>';}).join('');
  var durH=Math.floor((o.durMin||60)/60),durM=(o.durMin||60)%60;
  var dhOpts='';for(var dhi=0;dhi<13;dhi++)dhOpts+='<option value="'+dhi+'"'+(dhi===durH?' selected':'')+'>'+dhi+'시간</option>';
  var dmOpts=[0,5,10,15,20,25,30,35,40,45,50,55].map(function(dmi){return '<option value="'+dmi+'"'+(dmi===durM?' selected':'')+'>'+pad(dmi)+'분</option>';}).join('');
  document.getElementById('modal-root').innerHTML=
    '<div class="overlay" id="ov"><div class="modal"><h3>'+(o.id?'이벤트 수정':'새 이벤트')+'</h3>'+
    '<label>제목</label><input type="text" id="ev-t" value="'+esc(o.title||'')+'" placeholder="제목...">'+
    '<label>날짜</label><input type="date" id="ev-d" value="'+(o.date||dfmt(cur))+'">'+
    '<label>시작 시간</label><div style="display:flex;gap:6px;"><select id="ev-h" style="flex:1">'+hOpts+'</select><select id="ev-m" style="flex:1">'+mOpts+'</select></div>'+
    '<label>소요 시간</label><div style="display:flex;gap:6px;"><select id="ev-dh" style="flex:1">'+dhOpts+'</select><select id="ev-dm" style="flex:1">'+dmOpts+'</select></div>'+
    '<label>메모</label><textarea id="ev-n">'+esc(o.note||'')+'</textarea>'+
    '<label>캘린더</label><select id="ev-c" onchange="calChg()">'+calOpts+'</select>'+
    '<label>색상</label><div class="cpicks">'+picks+'</div>'+
    '<div class="modal-btns">'+(o.id?'<button class="mbtn del" type="button" onclick="delEv(\''+o.id+'\')">삭제</button>':'')+
    '<button class="mbtn" type="button" onclick="closeMod()">취소</button>'+
    '<button class="mbtn pri" type="button" onclick="saveEv('+(o.id?'\''+o.id+'\'':'null')+')">저장</button>'+
    '</div></div></div>';
  document.getElementById('ov').addEventListener('click',function(e){if(e.target===this)closeMod();});
  setTimeout(function(){var el=document.getElementById('ev-t');if(el)el.focus();},30);
}
function pickCol(c){_sc=c;document.querySelectorAll('.cpick').forEach(function(el){el.classList.toggle('sel',el.dataset.c===c);});}
function calChg(){var c=CALS.find(function(x){return x.id===document.getElementById('ev-c').value;});if(c)pickCol(c.color);}
function closeMod(){document.getElementById('modal-root').innerHTML='';}
function saveEv(existId){
  var title=document.getElementById('ev-t').value.trim();if(!title)return;
  var dv=document.getElementById('ev-d').value;if(!dv)return;
  var p=dv.split('-');var key=parseInt(p[0])+'-'+parseInt(p[1])+'-'+parseInt(p[2]);
  var hour=parseInt(document.getElementById('ev-h').value)||0;
  var min=parseInt(document.getElementById('ev-m').value)||0;
  var dh=parseInt(document.getElementById('ev-dh').value)||0;
  var dm=parseInt(document.getElementById('ev-dm').value)||0;
  var durMin=(dh*60+dm)||60;
  var note=document.getElementById('ev-n').value;
  var calId=document.getElementById('ev-c').value;
  var color=_sc||(CALS.find(function(c){return c.id===calId;})||CALS[0]).color;
  if(!events[key])events[key]=[];
  if(existId)events[key]=events[key].filter(function(e){return e.id!==existId;});
  events[key].push({id:'e'+(++eid),title:title,hour:hour,min:min,durMin:durMin,note:note,calId:calId,color:color});
  save();closeMod();renderContent();
}
function delEv(id){Object.keys(events).forEach(function(k){events[k]=events[k].filter(function(e){return e.id!==id;});});save();closeMod();renderContent();}
function editEv(id){
  var ev=null,key=null;
  Object.keys(events).forEach(function(k){events[k].forEach(function(e){if(e.id===id){ev=e;key=k;}});});
  if(!ev)return;var p=key.split('-');
  openEvModal({id:ev.id,title:ev.title,date:pad(parseInt(p[0]))+'-'+pad(parseInt(p[1]))+'-'+pad(parseInt(p[2])),hour:ev.hour,min:ev.min||0,durMin:ev.durMin||60,note:ev.note,calId:ev.calId,color:ev.color});
}

// ═══ RENDER ══════════════════════════════════════════════

// ═══ MONTH ═══════════════════════════════════════════════
function renderMonth(){
  var html='<div class="mv"><div class="mv-dow">';
  ['일','월','화','수','목','금','토'].forEach(function(d){html+='<div>'+d+'</div>';});
  html+='</div><div class="mv-grid">';
  var first=new Date(cur.getFullYear(),cur.getMonth(),1);var st=new Date(first);st.setDate(1-first.getDay());
  for(var i=0;i<42;i++){
    var d=new Date(st);d.setDate(st.getDate()+i);var dow=d.getDay();var om=d.getMonth()!==cur.getMonth();var hol=getHol(d);
    var nc='mc-n'+(isToday(d)?' tod':om?' om':hol?' hol':dow===0?' sun':dow===6?' sat':'');
    html+='<div class="mc" onclick="goDay('+d.getFullYear()+','+d.getMonth()+','+d.getDate()+')" ondblclick="event.stopPropagation();openEvModal({date:\''+dfmt(d)+'\'})"><div class="'+nc+'" style="'+(om?'opacity:.3':'')+'">'+d.getDate()+'</div>';
    if(hol)html+='<div class="mc-hol">'+esc(hol)+'</div>';
    var key=dk(d);
    if(events[key]){var vis=events[key].filter(function(ev){var c=CALS.find(function(x){return x.id===ev.calId;});return!c||c.on;});vis.slice(0,2).forEach(function(ev){html+='<div class="mc-ev" style="background:'+ev.color+'20;color:'+ev.color+';" onclick="event.stopPropagation();editEv(\''+ev.id+'\')">'+esc(ev.title)+'</div>';});if(vis.length>2)html+='<div style="font-size:9px;color:var(--tx3);padding:0 3px;">+'+( vis.length-2)+'개</div>';}
    html+='</div>';
  }
  html+='</div></div>';document.getElementById('content').innerHTML=html;
}

// ═══ WEEK ════════════════════════════════════════════════
function renderWeek(){
  var ws=new Date(cur);ws.setDate(cur.getDate()-cur.getDay());
  var dn=['일','월','화','수','목','금','토'];
  var html='<div class="wv"><div class="wv-hdr"><div class="wh-sp"></div>';
  for(var i=0;i<7;i++){var d=new Date(ws);d.setDate(ws.getDate()+i);var hol=getHol(d);html+='<div class="wh-day" onclick="goDay('+d.getFullYear()+','+d.getMonth()+','+d.getDate()+')"><div class="wh-dn" style="'+(hol||i===0?'color:#E24B4A':i===6?'color:#185FA5':'')+'">'+dn[i]+'</div><div class="wh-num'+(isToday(d)?' tod':'')+'">'+d.getDate()+'</div></div>';}
  html+='</div><div class="wv-body"><div class="wt-col">';
  for(var h=0;h<24;h++)html+='<div class="wt-h">'+(h===0?'':pad(h)+':00')+'</div>';
  html+='</div>';
  for(var i=0;i<7;i++){
    var d=new Date(ws);d.setDate(ws.getDate()+i);
    html+='<div class="we-col">';
    for(var h=0;h<24;h++)html+='<div class="we-slot" ondblclick="openEvModal({date:\''+dfmt(d)+'\',hour:'+h+'})"></div>';
    var key=dk(d);
    if(events[key])events[key].forEach(function(ev){var c=CALS.find(function(x){return x.id===ev.calId;});if(c&&!c.on)return;var tp=(ev.hour||0)*52;var ht=Math.max((ev.durMin||60)/60*52-4,20);html+='<div class="we-ev" style="top:'+tp+'px;height:'+ht+'px;background:'+ev.color+'1a;color:'+ev.color+';border-left-color:'+ev.color+';" onclick="editEv(\''+ev.id+'\')">'+pad(ev.hour)+':00 '+esc(ev.title)+'</div>';});
    html+='</div>';
  }
  html+='</div></div>';document.getElementById('content').innerHTML=html;
  setTimeout(function(){var s=document.querySelector('.wv-body');if(s)s.scrollTop=6*52;},30);
}

// ═══ DAILY VIEW ══════════════════════════════════════════
// drag state
var dragTaskId=null;   // task being dragged from list
var dragBlockId=null;  // block being moved within timebox
var dragOffsetMin=0;   // minute offset within block where drag started

function renderDay(){
  var key=dk(cur);
  if(!timeline[key])timeline[key]=[];
  var dn=['일','월','화','수','목','금','토'];
  var k_day=dk(cur);var tl_day=timeline[k_day]||[];var tasks=getTasks(k_day);
  var placedIds=tl_day.map(function(b){return b.id;});
  var remaining=tasks.filter(function(t){return placedIds.indexOf(t.id)===-1;}).length;
  var ct=document.getElementById('content');
  ct.innerHTML='';

  var dv=mk('div','dv');

  // ── Task panel (LEFT)
  var tp=mk('div','tp');
  var tph=mk('div','tp-hdr');
  tph.innerHTML='<span>할 일</span>';
  var cnt=mk('span','tp-cnt');cnt.id='tp-cnt';cnt.textContent=remaining+'/'+tasks.length;
  tph.appendChild(cnt);tp.appendChild(tph);

  var tpl=mk('div','tp-list');tpl.id='tp-list';
  buildChips(tpl,tasks);
  tp.appendChild(tpl);

  var tpa=mk('div','tp-add');
  var inp=document.createElement('input');
  inp.type='text';inp.placeholder='할 일 추가...';inp.autocomplete='off';
  inp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();doAddTask(inp);}});
  var btn=document.createElement('button');
  btn.type='button';btn.textContent='+';
  btn.addEventListener('click',function(){doAddTask(inp);});
  tpa.appendChild(inp);tpa.appendChild(btn);
  tp.appendChild(tpa);
  dv.appendChild(tp);

  // ── Timebox panel (RIGHT)
  var tbp=mk('div','tbp');
  var tbh=mk('div','tbp-hdr');
  tbh.innerHTML='<span>타임박스</span><span class="tbp-date">'+cur.getFullYear()+'.'+( cur.getMonth()+1)+'.'+cur.getDate()+' ('+dn[cur.getDay()]+')</span>';
  tbp.appendChild(tbh);

  // Event pills bar
  var evb=mk('div','ev-bar');
  var dayEvs=(events[key]||[]).filter(function(ev){var c=CALS.find(function(x){return x.id===ev.calId;});return!c||c.on;});
  dayEvs.forEach(function(ev){
    var pill=mk('div','ev-pill');pill.style.cssText='background:'+ev.color+'18;color:'+ev.color+';';
    pill.textContent=pad(ev.hour)+':'+(ev.min?pad(ev.min):'00')+' '+ev.title;
    pill.addEventListener('click',function(){editEv(ev.id);});evb.appendChild(pill);
  });
  var aeb=document.createElement('button');aeb.type='button';
  aeb.style.cssText='font-size:11px;padding:2px 9px;background:var(--ac);color:#fff;border:none;border-radius:20px;cursor:pointer;';
  aeb.textContent='+ 이벤트';aeb.addEventListener('click',function(){openEvModal({date:dfmt(cur)});});
  evb.appendChild(aeb);tbp.appendChild(evb);

  // ── Timebox scroll area
  var outer=mk('div','tbx-outer');
  var inner=mk('div','tbx-inner');
  inner.style.height=(24*HPXH)+'px';

  // Hour lines (visual only, pointer-events:none in CSS)
  for(var h=0;h<24;h++){
    var line=mk('div','hr-line');
    line.style.top=(h*HPXH)+'px';
    line.style.height=HPXH+'px';
    var lbl=mk('div','hr-label');lbl.textContent=h===0?'':pad(h)+':00';
    var tick=mk('div','hr-tick');
    line.appendChild(lbl);line.appendChild(tick);inner.appendChild(line);
  }

  // ── Drop target: attach to outer scroll container so tblocks don't block drops
  var dropZone=outer; // use outer as the drop zone
  outer.addEventListener('dragover',function(e){
    e.preventDefault();e.dataTransfer.dropEffect='move';inner.style.background='rgba(83,74,183,.03)';
  });
  outer.addEventListener('dragleave',function(e){
    if(!outer.contains(e.relatedTarget))inner.style.background='';
  });
  outer.addEventListener('drop',function(e){
    e.preventDefault();inner.style.background='';
    var outerRect=outer.getBoundingClientRect();
    var scrollTop=outer.scrollTop||0;
    var relY=(e.clientY-outerRect.top)+scrollTop;
    var droppedMin=Math.round(pxToMin(relY)/5)*5;
    droppedMin=Math.max(0,Math.min(24*60-15,droppedMin));
    var k=dk(cur);
    if(!timeline[k])timeline[k]=[];

    // Read type from dataTransfer (more reliable than global vars across browsers)
    var raw='';
    try{raw=e.dataTransfer.getData('text/plain');}catch(ex){}

    if(raw.indexOf('ev:')===0 || dragEvId){
      var eid2=dragEvId||(raw.replace('ev:',''));
      var newStart=droppedMin-dragEvOffsetMin;
      newStart=Math.max(0,Math.min(24*60-15,Math.round(newStart/5)*5));
      if(!events[k])events[k]=[];
      var ev2=(events[k]||[]).find(function(x){return x.id===eid2;});
      if(ev2){ev2.hour=Math.floor(newStart/60);ev2.min=newStart%60;}
      dragEvId=null;dragEvOffsetMin=0;
      save();drawBlocks(inner,k);drawEvents(inner,k);refreshList();
      return;
    }

    if(raw.indexOf('block:')===0 || dragBlockId){
      var bid=dragBlockId||(raw.replace('block:',''));
      var newStart=droppedMin-dragOffsetMin;
      newStart=Math.max(0,Math.min(24*60-15,Math.round(newStart/5)*5));
      var blk2=timeline[k].find(function(b){return b.id===bid;});
      if(blk2){blk2.startMin=newStart;}
      dragBlockId=null;dragOffsetMin=0;
      save();drawBlocks(inner,k);drawEvents(inner,k);refreshList();
      return;
    }

    if(raw.indexOf('task:')===0 || dragTaskId){
      var tid2=dragTaskId||(raw.replace('task:',''));
      if(!tid2){return;}
      if(timeline[k].some(function(b){return b.id===tid2;})){dragTaskId=null;return;}
      var startMin=Math.round(droppedMin/5)*5;
      timeline[k].push({id:tid2,startMin:startMin,durMin:60});
      dragTaskId=null;
      save();drawBlocks(inner,k);drawEvents(inner,k);refreshList();
      return;
    }
  });
  // dropZone is outer, no need to append

  // Draw blocks and events
  drawBlocks(inner,key);
  drawEvents(inner,key);

  outer.appendChild(inner);tbp.appendChild(outer);
  dv.appendChild(tbp);ct.appendChild(dv);

  setTimeout(function(){outer.scrollTop=6*HPXH;},30);
}

function drawBlocks(inner,key){
  // Remove old task blocks
  inner.querySelectorAll('.tblock').forEach(function(el){el.remove();});
  var blocks=timeline[key]||[];
  blocks.forEach(function(b){
    var t=tasks.find(function(x){return x.id===b.id;});if(!t)return;
    var topPx=minToPx(b.startMin);
    var htPx=Math.max(minToPx(b.durMin),28);
    var blk=mk('div','tblock');
    blk.style.cssText='top:'+topPx+'px;height:'+htPx+'px;background:'+t.color+'18;border:1.5px solid '+t.color+'66;cursor:move;';
    blk.draggable=true;

    blk.addEventListener('dragstart',function(e){
      var rect=blk.getBoundingClientRect();
      var scrollTop=(document.querySelector('.tbx-outer')||{scrollTop:0}).scrollTop;
      dragOffsetMin=pxToMin(e.clientY-rect.top);
      dragBlockId=b.id;dragTaskId=null;
      e.dataTransfer.setData('text/plain','block:'+b.id);
      e.dataTransfer.effectAllowed='move';
      setTimeout(function(){blk.style.opacity='.3';},0);
    });
    blk.addEventListener('dragend',function(){blk.style.opacity='1';setTimeout(function(){dragBlockId=null;},100);});

    // Top row
    var tr=mk('div','tblock-top');
    var dot=mk('div','cdot');dot.style.background=t.color;
    var ttxt=mk('span');ttxt.style.cssText='flex:1;font-size:11px;font-weight:500;color:'+t.color+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';ttxt.textContent=t.text;
    var rm=document.createElement('button');rm.type='button';rm.className='rm-btn';rm.style.color=t.color;rm.textContent='✕';
    rm.addEventListener('click',function(e){e.stopPropagation();removeBlock(b.id,key);});
    tr.appendChild(dot);tr.appendChild(ttxt);tr.appendChild(rm);blk.appendChild(tr);

    if(htPx>=44){
      var br=mk('div','tblock-bot');
      var tlbl=mk('span');tlbl.style.cssText='font-size:10px;color:'+t.color+';opacity:.8;flex:1;';
      tlbl.textContent=minToStr(b.startMin)+' — '+minToStr(b.startMin+b.durMin);
      var ctrl=mk('div','dur-ctrl');
      var bs='background:'+t.color+'18;color:'+t.color+';border:1px solid '+t.color+'44;';
      var mb=document.createElement('button');mb.type='button';mb.className='dur-btn';mb.style.cssText=bs;mb.textContent='−';
      if(b.durMin<=15)mb.disabled=true;
      mb.addEventListener('click',function(e){e.stopPropagation();changeDur(b.id,key,-15);});
      var dl=mk('span');dl.style.cssText='font-size:10px;color:'+t.color+';min-width:32px;text-align:center;font-weight:500;';
      var hh=Math.floor(b.durMin/60),mm=b.durMin%60;dl.textContent=hh>0?(mm>0?hh+'h'+mm+'m':hh+'h'):mm+'m';
      var pb=document.createElement('button');pb.type='button';pb.className='dur-btn';pb.style.cssText=bs;pb.textContent='+';
      if(b.startMin+b.durMin>=24*60)pb.disabled=true;
      pb.addEventListener('click',function(e){e.stopPropagation();changeDur(b.id,key,15);});
      ctrl.appendChild(mb);ctrl.appendChild(dl);ctrl.appendChild(pb);
      br.appendChild(tlbl);br.appendChild(ctrl);blk.appendChild(br);
    }
    inner.appendChild(blk);
  });
}

function drawEvents(inner,key){
  inner.querySelectorAll('.ev-block').forEach(function(el){el.remove();});
  var dayEvs=(events[key]||[]).filter(function(ev){var c=CALS.find(function(x){return x.id===ev.calId;});return!c||c.on;});
  dayEvs.forEach(function(ev){
    var startMin=(ev.hour||0)*60+(ev.min||0);
    var durMin=ev.durMin||60;
    var topPx=minToPx(startMin);
    var htPx=Math.max(minToPx(durMin),24);
    var blk=mk('div','ev-block');
    blk.style.cssText='top:'+topPx+'px;height:'+htPx+'px;background:'+ev.color+'18;border-left-color:'+ev.color+';cursor:move;';
    blk.draggable=true;
    blk.innerHTML='<div style="font-size:11px;font-weight:500;color:'+ev.color+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+esc(ev.title)+'</div>';
    if(htPx>=38)blk.innerHTML+='<div style="font-size:10px;color:'+ev.color+';opacity:.75;">'+minToStr(startMin)+' — '+minToStr(startMin+durMin)+'</div>';
    blk.addEventListener('click',function(e){if(!e._wasDrag)editEv(ev.id);});
    blk.addEventListener('dragstart',function(e){
      var rect=blk.getBoundingClientRect();
      var outerEl=document.querySelector('.tbx-outer');
      dragEvId=ev.id;dragTaskId=null;dragBlockId=null;
      dragEvOffsetMin=pxToMin(e.clientY-rect.top+(outerEl?outerEl.scrollTop:0)-topPx);
      dragEvOffsetMin=Math.max(0,dragEvOffsetMin);
      e.dataTransfer.setData('text/plain','ev:'+ev.id);
      e.dataTransfer.effectAllowed='move';
      blk._wasDrag=false;
      setTimeout(function(){blk.style.opacity='.35';},0);
    });
    blk.addEventListener('dragend',function(){
      blk.style.opacity='1';
      blk._wasDrag=true;
      setTimeout(function(){blk._wasDrag=false;},200);
      setTimeout(function(){dragEvId=null;},100);
    });
    inner.appendChild(blk);
  });
}

function buildChips(container,tasks){
  container.innerHTML='';
  tasks.forEach(function(t){
    var inToday=timeline[dk(cur)]&&timeline[dk(cur)].some(function(b){return b.id===t.id;});
    var chip=mk('div','tchip'+(inToday?' placed':' draggable'));
    chip.id='tc-'+t.id;chip.draggable=!inToday;
    var dot=mk('div','cdot');dot.style.background=t.color;
    var txt=mk('span');txt.style.flex='1';txt.style.fontSize='11px';txt.style.color='var(--tx)';txt.textContent=t.text;
    chip.appendChild(dot);chip.appendChild(txt);
    if(!inToday){
      var db=document.createElement('button');db.type='button';
      db.style.cssText='background:none;border:none;cursor:pointer;font-size:11px;opacity:.35;color:var(--tx2);padding:0 1px;flex-shrink:0;';db.textContent='✕';
      db.addEventListener('click',function(e){e.stopPropagation();deleteTask(t.id);});chip.appendChild(db);
      chip.addEventListener('dragstart',function(e){
        dragTaskId=t.id;dragBlockId=null;
        e.dataTransfer.setData('text/plain','task:'+t.id);
        e.dataTransfer.effectAllowed='move';
        setTimeout(function(){chip.classList.add('dragging');},0);
      });
      chip.addEventListener('dragend',function(){chip.classList.remove('dragging');setTimeout(function(){dragTaskId=null;},100);});
    }
    container.appendChild(chip);
  });
}

function refreshList(){
  var k=dk(cur);var tasks=getTasks(k);
  var list=document.getElementById('tp-list');if(list)buildChips(list,tasks);
  var tl=timeline[k]||[];
  var placed=tl.map(function(b){return b.id;});
  var rem=tasks.filter(function(t){return placed.indexOf(t.id)===-1;}).length;
  var cnt=document.getElementById('tp-cnt');if(cnt)cnt.textContent=rem+'/'+tasks.length;
}

function doAddTask(inp){
  if(!inp)return;var text=inp.value.trim();if(!text)return;
  var color=TC[tcIdx%TC.length];tcIdx++;
  var k=dk(cur);getTasks(k).push({id:'t'+(++tid),text:text,color:color});
  inp.value='';inp.focus();save();refreshList();
}

function removeBlock(id,key){
  timeline[key]=(timeline[key]||[]).filter(function(b){return b.id!==id;});
  // placed state computed dynamically
  save();
  var inner=document.querySelector('.tbx-inner');
  if(inner){drawBlocks(inner,key);drawEvents(inner,key);}
  refreshList();
}

function changeDur(id,key,deltaMin){
  var b=(timeline[key]||[]).find(function(x){return x.id===id;});if(!b)return;
  var nd=b.durMin+deltaMin;
  if(nd<15||b.startMin+nd>24*60)return;
  b.durMin=nd;save();
  var inner=document.querySelector('.tbx-inner');
  if(inner){drawBlocks(inner,key);drawEvents(inner,key);}
}

function resetAllData(){
  if(!confirm('모든 데이터를 초기화하시겠습니까?'))return;
  dailyTasks={};timeline={};events={};
  localStorage.removeItem('mp_t');localStorage.removeItem('mp_dt');localStorage.removeItem('mp_tl');localStorage.removeItem('mp_e');
  if(sbReady&&sbClient){
    sbClient.from(SB_TBL).delete().eq('id','main').then(function(){syncLbl('초기화 완료','#0F6E56');});
  }
  render();
}

function deleteTask(id){
  var k=dk(cur);
  dailyTasks[k]=(dailyTasks[k]||[]).filter(function(x){return x.id!==id;});
  timeline[k]=(timeline[k]||[]).filter(function(b){return b.id!==id;});
  save();refreshList();
  var inner=document.querySelector('.tbx-inner');
  if(inner){drawBlocks(inner,k);drawEvents(inner,k);}
}

// ═══ BOOT ════════════════════════════════════════════════
loadLocal();if(!Object.keys(dailyTasks).length)initSample();render();
</script>
