<title>Mission Planner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
:root{
  --bg:#fff;--bg2:#f5f5f7;--bg3:#e8e8ed;
  --tx:#1d1d1f;--tx2:#6e6e73;--tx3:#98989d;
  --bd:#d2d2d7;--bd2:#c7c7cc;
  --ac:#534AB7;--ac2:#3C3489;
  --r:8px;--rl:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
  --tx:#f2f2f7;--tx2:#aeaeb2;--tx3:#636366;
  --bd:#38383a;--bd2:#48484a;
}}
body{background:var(--bg3);min-height:100vh;padding-top:env(safe-area-inset-top);}
.app{display:flex;flex-direction:column;min-height:100vh;}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg2);border-bottom:0.5px solid var(--bd);position:sticky;top:0;z-index:50;}
.app-icon{width:24px;height:24px;background:var(--ac);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;flex-shrink:0;}
.cal-title{font-size:15px;font-weight:500;color:var(--tx);flex:1;}
.vbtns{display:flex;gap:2px;background:var(--bg3);border-radius:var(--r);padding:2px;}
.vbtn{padding:4px 10px;font-size:11px;border:none;background:none;cursor:pointer;border-radius:6px;color:var(--tx2);}
.vbtn.on{background:var(--bg);color:var(--tx);font-weight:500;}
.tbtn{padding:5px 10px;font-size:12px;border:0.5px solid var(--bd2);border-radius:var(--r);background:none;cursor:pointer;color:var(--tx2);}
.tbtn:hover{background:var(--bg);}
.today-btn{background:var(--ac);color:#fff;border-color:var(--ac);}
.today-btn:hover{background:var(--ac2);}
.navbtn{padding:4px 8px;font-size:16px;background:none;border:none;cursor:pointer;color:var(--tx2);border-radius:var(--r);}
.navbtn:hover{background:var(--bg);}
.sync-lbl{font-size:11px;min-width:70px;text-align:right;}

/* GOAL PANEL */
.goal-panel{background:var(--bg);border-bottom:0.5px solid var(--bd);flex-shrink:0;}
.gp-hdr{display:flex;align-items:center;gap:8px;padding:5px 16px;border-bottom:0.5px solid var(--bd);}
.gp-title{font-size:10px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;flex:1;}
.ztb{padding:3px 9px;font-size:10px;border-radius:20px;border:0.5px solid var(--bd2);background:none;cursor:pointer;color:var(--tx2);}
.ztb.on{color:#fff;border-color:transparent;}
.ztb[data-z="mission"].on{background:#534AB7;}
.ztb[data-z="life"].on{background:#0F6E56;}
.ztb[data-z="yearly"].on{background:#BA7517;}
.ztb[data-z="monthly"].on{background:#185FA5;}
.ztb[data-z="weekly"].on{background:#993C1D;}
.goal-rows{display:flex;gap:6px;padding:7px 16px;overflow-x:auto;}
.glane{min-width:120px;flex:1;background:var(--bg2);border-radius:var(--r);overflow:hidden;border:0.5px solid var(--bd);}
.glane.hidden{display:none;}
.gl-hdr{padding:4px 8px;font-size:10px;font-weight:500;display:flex;align-items:center;justify-content:space-between;}
.gl-hdr[data-z="mission"]{background:#EEEDFE;color:#3C3489;}
.gl-hdr[data-z="life"]{background:#E1F5EE;color:#085041;}
.gl-hdr[data-z="yearly"]{background:#FAEEDA;color:#633806;}
.gl-hdr[data-z="monthly"]{background:#E6F1FB;color:#0C447C;}
.gl-hdr[data-z="weekly"]{background:#FAECE7;color:#712B13;}
.gl-add-btn{background:none;border:none;cursor:pointer;font-size:15px;opacity:.5;color:inherit;}
.gl-add-btn:hover{opacity:1;}
.gl-items{padding:3px;display:flex;flex-direction:column;gap:2px;min-height:32px;}
.gl-item{padding:3px 6px;font-size:11px;background:var(--bg);border-radius:4px;border:0.5px solid var(--bd);cursor:grab;display:flex;align-items:center;gap:3px;user-select:none;}
.gl-item.dragging{opacity:.3;}
.gl-item span{flex:1;color:var(--tx);}
.gl-del{background:none;border:none;cursor:pointer;font-size:11px;opacity:0;color:var(--tx2);}
.gl-item:hover .gl-del{opacity:.7;}
.gl-inp{width:100%;padding:3px 6px;font-size:11px;border:none;background:var(--bg);color:var(--tx);outline:none;border-radius:4px;}
.gdz.over{background:rgba(83,74,183,.1);}

/* MAIN */
.main{display:flex;flex:1;overflow:hidden;height:calc(100vh - 128px);}
.sidebar{width:200px;flex-shrink:0;border-right:0.5px solid var(--bd);display:flex;flex-direction:column;background:var(--bg2);overflow:hidden;}
.mini-cal{padding:10px;}
.mini-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.mini-title{font-size:12px;font-weight:500;color:var(--tx);}
.mini-nav{background:none;border:none;cursor:pointer;font-size:12px;color:var(--tx2);padding:2px 5px;border-radius:4px;}
.mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
.mini-dh{font-size:9px;color:var(--tx3);text-align:center;padding:2px 0;}
.mini-d{font-size:10px;text-align:center;border-radius:50%;cursor:pointer;color:var(--tx2);width:24px;height:24px;display:flex;align-items:center;justify-content:center;margin:auto;}
.mini-d:hover{background:var(--bg);}
.mini-d.tod{background:var(--ac);color:#fff;}
.mini-d.sel{background:rgba(83,74,183,.15);color:var(--ac);font-weight:500;}
.mini-d.om{opacity:.3;}
.mini-d.hol{color:#E24B4A;}
.sb-sec{padding:7px 10px;border-top:0.5px solid var(--bd);}
.sb-title{font-size:10px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.cal-item{display:flex;align-items:center;gap:7px;padding:3px 0;font-size:11px;color:var(--tx2);cursor:pointer;border-radius:4px;}
.cal-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.cal-item.off .cal-dot{opacity:.3;}
.cal-item.off span{opacity:.4;}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--bg);}

/* MONTH */
.mv{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.mv-dow{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:0.5px solid var(--bd);flex-shrink:0;}
.mv-dow div{font-size:10px;color:var(--tx2);text-align:center;padding:5px 0;}
.mv-dow div:first-child{color:#E24B4A;}
.mv-dow div:last-child{color:#185FA5;}
.mv-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:repeat(6,1fr);flex:1;}
.mc{border-right:0.5px solid var(--bd);border-bottom:0.5px solid var(--bd);padding:3px;cursor:pointer;overflow:hidden;background:var(--bg);}
.mc:nth-child(7n){border-right:none;}
.mc:hover{background:var(--bg2);}
.mc-n{font-size:11px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:2px;color:var(--tx2);}
.mc-n.tod{background:var(--ac);color:#fff;font-weight:500;}
.mc-n.om{opacity:.35;}
.mc-n.sun{color:#E24B4A;}
.mc-n.sat{color:#185FA5;}
.mc-hol{font-size:9px;color:#E24B4A;margin-bottom:1px;}
.mc-ev{font-size:10px;padding:1px 4px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}

/* WEEK */
.wv{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.wv-hdr{display:grid;grid-template-columns:48px repeat(7,1fr);border-bottom:0.5px solid var(--bd);flex-shrink:0;background:var(--bg);}
.wh-sp{border-right:0.5px solid var(--bd);}
.wh-day{text-align:center;padding:5px 2px;border-right:0.5px solid var(--bd);cursor:pointer;}
.wh-day:hover{background:var(--bg2);}
.wh-dn{font-size:10px;color:var(--tx2);}
.wh-num{font-size:17px;font-weight:300;color:var(--tx2);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;margin:2px auto 0;}
.wh-num.tod{background:var(--ac);color:#fff;}
.wv-body{flex:1;overflow-y:auto;display:grid;grid-template-columns:48px repeat(7,1fr);}
.wt-col{border-right:0.5px solid var(--bd);}
.wt-h{height:52px;padding:3px 5px 0;font-size:10px;color:var(--tx3);text-align:right;border-bottom:0.5px solid rgba(0,0,0,.05);}
.we-col{border-right:0.5px solid var(--bd);position:relative;}
.we-slot{height:52px;border-bottom:0.5px solid rgba(0,0,0,.05);cursor:pointer;}
.we-slot:hover{background:var(--bg2);}
.we-ev{position:absolute;left:2px;right:2px;border-radius:4px;padding:2px 5px;font-size:10px;overflow:hidden;cursor:pointer;z-index:2;border-left:3px solid;}

/* DAILY */
.dv{flex:1;display:flex;overflow:hidden;}
.task-panel{width:195px;flex-shrink:0;border-right:0.5px solid var(--bd);display:flex;flex-direction:column;background:var(--bg);}
.tp-hdr{padding:9px 10px;font-size:12px;font-weight:500;color:var(--tx);border-bottom:0.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between;}
.tp-cnt{font-size:10px;color:var(--tx3);font-weight:400;}
.tp-list{flex:1;overflow-y:auto;padding:5px;}
.tchip{padding:7px 8px;font-size:12px;border-radius:var(--r);border:0.5px solid var(--bd);background:var(--bg2);display:flex;align-items:center;gap:5px;margin-bottom:4px;user-select:none;}
.tchip.draggable{cursor:grab;}
.tchip.draggable:active{cursor:grabbing;opacity:.5;}
.tchip.placed{opacity:.35;text-decoration:line-through;}
.tchip.dragging{opacity:.2;}
.cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.tp-add{padding:6px;border-top:0.5px solid var(--bd);display:flex;gap:4px;}
.tp-add input{flex:1;padding:6px 8px;font-size:13px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--tx);outline:none;}
.tp-add input:focus{border-color:var(--ac);}
.tp-add button{padding:6px 11px;font-size:14px;font-weight:600;background:var(--ac);color:#fff;border:none;border-radius:var(--r);cursor:pointer;pointer-events:all;-webkit-app-region:no-drag;user-select:none;-webkit-user-select:none;}
.tp-add button:hover{background:var(--ac2);}
.tp-add button:active{transform:scale(.96);}
.tbx-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.tbx-hdr{padding:9px 12px;font-size:12px;font-weight:500;color:var(--tx);border-bottom:0.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between;}
.tbx-date{font-size:11px;color:var(--tx2);font-weight:400;}
.ev-bar{padding:5px 10px;border-bottom:0.5px solid var(--bd);background:var(--bg2);display:flex;flex-wrap:wrap;gap:4px;align-items:center;min-height:34px;}
.ev-pill{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;font-size:11px;border-radius:20px;cursor:pointer;}
.tbx-scroll{flex:1;overflow-y:auto;}
.hr{display:flex;min-height:56px;border-bottom:0.5px solid rgba(0,0,0,.06);}
.hr-lbl{width:52px;padding:7px 6px 0;font-size:10px;color:var(--tx3);flex-shrink:0;border-right:0.5px solid var(--bd);display:flex;align-items:flex-start;}
.hr-slot{flex:1;padding:3px 5px;display:flex;flex-direction:column;gap:3px;min-height:56px;}
.hr-slot.over{background:rgba(83,74,183,.07);}
.tblock{border-radius:var(--r);padding:5px 8px;display:flex;flex-direction:column;gap:4px;}
.tblock-top{display:flex;align-items:center;gap:4px;}
.tblock-bot{display:flex;align-items:center;gap:5px;}
.dur-ctrl{display:flex;gap:3px;align-items:center;margin-left:auto;}
.dur-btn{width:22px;height:22px;border-radius:4px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.dur-btn:disabled{opacity:.3;cursor:default;}
.rm-btn{background:none;border:none;cursor:pointer;font-size:13px;opacity:.45;line-height:1;flex-shrink:0;}
.rm-btn:hover{opacity:1;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200;}
.modal{background:var(--bg);border-radius:var(--rl);padding:22px;width:310px;border:0.5px solid var(--bd);box-shadow:0 20px 60px rgba(0,0,0,.25);}
.modal h3{font-size:15px;font-weight:500;margin-bottom:14px;color:var(--tx);}
.modal label{font-size:11px;color:var(--tx2);display:block;margin-bottom:3px;margin-top:10px;}
.modal input,.modal select,.modal textarea{width:100%;padding:7px 8px;font-size:12px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--tx);outline:none;}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--ac);}
.modal textarea{resize:none;height:56px;}
.modal-btns{display:flex;gap:7px;margin-top:14px;justify-content:flex-end;}
.mbtn{padding:7px 14px;font-size:12px;border-radius:var(--r);cursor:pointer;border:0.5px solid var(--bd2);background:none;color:var(--tx2);}
.mbtn.pri{background:var(--ac);color:#fff;border-color:var(--ac);}
.mbtn.pri:hover{background:var(--ac2);}
.mbtn.del{color:#E24B4A;border-color:rgba(226,75,74,.3);}
.cpicks{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;}
.cpick{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.cpick:hover{transform:scale(1.15);}
.cpick.sel{border-color:var(--tx);}

@media print{.topbar,.goal-panel,.sidebar{display:none!important;}.main{display:block;height:auto;}.content{overflow:visible;height:auto;}.mv-grid{grid-template-rows:repeat(6,110px);}}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="app-icon">M</div>
    <button class="tbtn today-btn" onclick="goToday()">오늘</button>
    <button class="navbtn" onclick="navigate(-1)">&#8249;</button>
    <button class="navbtn" onclick="navigate(1)">&#8250;</button>
    <div class="cal-title" id="cal-title"></div>
    <div class="vbtns">
      <button class="vbtn on" onclick="setView('month',this)">월</button>
      <button class="vbtn" onclick="setView('week',this)">주</button>
      <button class="vbtn" onclick="setView('day',this)">일</button>
    </div>
    <button class="tbtn" onclick="window.print()">🖨 인쇄</button>
    <span id="sync-lbl" class="sync-lbl" style="color:var(--tx3);">로컬 저장</span>
  </div>

  <div class="goal-panel">
    <div class="gp-hdr">
      <span class="gp-title">목표 계층</span>
      <div style="display:flex;gap:4px;">
        <button class="ztb on" data-z="mission" onclick="toggleZ('mission',this)">사명</button>
        <button class="ztb on" data-z="life" onclick="toggleZ('life',this)">인생</button>
        <button class="ztb on" data-z="yearly" onclick="toggleZ('yearly',this)">연간</button>
        <button class="ztb on" data-z="monthly" onclick="toggleZ('monthly',this)">월간</button>
        <button class="ztb on" data-z="weekly" onclick="toggleZ('weekly',this)">주간</button>
      </div>
    </div>
    <div class="goal-rows" id="goal-rows"></div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="mini-cal">
        <div class="mini-hdr">
          <span class="mini-title" id="mini-title"></span>
          <div>
            <button class="mini-nav" onclick="miniNav(-1)">&#8249;</button>
            <button class="mini-nav" onclick="miniNav(1)">&#8250;</button>
          </div>
        </div>
        <div class="mini-grid" id="mini-grid"></div>
      </div>
      <div class="sb-sec">
        <div class="sb-title">캘린더</div>
        <div id="cal-list"></div>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
  <div id="modal-root"></div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────
var today=new Date();
var cur=new Date(today);
var miniCur=new Date(today);
var selDate=new Date(today);
var view='month';
var gid=0,tid=0,eid=0;
var dragType=null,dragItem=null,dragGoalZ=null;
var syncT=null,sbReady=false,sbClient=null;

var CALS=[
  {id:'ministry',name:'사역',color:'#534AB7',on:true},
  {id:'writing',name:'저술·연구',color:'#0F6E56',on:true},
  {id:'edu',name:'교육',color:'#185FA5',on:true},
  {id:'personal',name:'개인',color:'#993C1D',on:true},
  {id:'family',name:'가정',color:'#BA7517',on:true}
];
var EV_COLORS=['#534AB7','#0F6E56','#185FA5','#993C1D','#BA7517','#639922','#E24B4A'];
var TASK_COLORS=['#534AB7','#0F6E56','#993C1D','#185FA5','#BA7517','#639922'];
var tcIdx=0;

var goals={
  mission:[{id:'g'+(++gid),text:'하나님 나라를 위한 교육 사역자'}],
  life:[{id:'g'+(++gid),text:'목회·학문·저술의 통합된 삶'},{id:'g'+(++gid),text:'가정과 사역의 균형'}],
  yearly:[{id:'g'+(++gid),text:'감정학교 출판'},{id:'g'+(++gid),text:'박사 논문 완성'}],
  monthly:[{id:'g'+(++gid),text:'감정학교 3장 초고'}],
  weekly:[{id:'g'+(++gid),text:'주일·수요 설교 준비'},{id:'g'+(++gid),text:'유튜브 영상 1편'}]
};
var zVis={mission:true,life:true,yearly:true,monthly:true,weekly:true};
var events={};
// tasks: [{id,text,color,placed}]
var tasks=[];
// timeline: {dateKey: [{id,hour,dur}]}
var timeline={};

// ── HELPERS ────────────────────────────────────────────────────────
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function pad(n){return n<10?'0'+n:String(n);}
function dk(d){return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function isToday(d){return sameDay(d,today);}
function dfmt(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}

// ── HOLIDAYS ───────────────────────────────────────────────────────
var holCache={};
function buildHol(y){
  var h={};
  [[1,1,'신정'],[3,1,'삼일절'],[5,5,'어린이날'],[6,6,'현충일'],[8,15,'광복절'],[10,3,'개천절'],[10,9,'한글날'],[12,25,'크리스마스']].forEach(function(f){h[y+'-'+f[0]+'-'+f[1]]=f[2];});

  addbtn.type='button';
  addbtn.textContent='+';
  addbtn.style.cssText='padding:6px 13px;font-size:16px;font-weight:700;background:var(--ac);color:#fff;border:none;border-radius:var(--r);cursor:pointer;pointer-events:all;-webkit-app-region:no-drag;flex-shrink:0;';
  // Use both mousedown and click for maximum compatibility
  addbtn.addEventListener('mousedown',function(e){e.preventDefault();});
  addbtn.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();doAddTask();});
  addbtn.addEventListener('touchend',function(e){e.preventDefault();doAddTask();});
  tpa.appendChild(inp);tpa.appendChild(addbtn);tp.appendChild(tpa);
  dv.appendChild(tp);

  // ── RIGHT: Timebox Panel
  var tbp=mk('div','tbx-panel');

  var tbh=mk('div','tbx-hdr');
  tbh.innerHTML='<span>타임박스</span>';
  var datelbl=mk('span','tbx-date');datelbl.textContent=cur.getFullYear()+'.'+( cur.getMonth()+1)+'.'+cur.getDate()+' '+dn[cur.getDay()]+'요일';
  tbh.appendChild(datelbl);tbp.appendChild(tbh);

  // Events bar
  var evb=mk('div','ev-bar');
  var dayEvs=events[key]?events[key].filter(function(ev){var c=CALS.find(function(x){return x.id===ev.calId;});return!c||c.on;}):[];
  dayEvs.forEach(function(ev){
    var pill=mk('div','ev-pill');pill.style.cssText='background:'+ev.color+'18;color:'+ev.color+';';pill.textContent=pad(ev.hour)+':00 '+ev.title;
    pill.addEventListener('click',function(){editEv(ev.id);});evb.appendChild(pill);
  });
  var aeb=mk('button');aeb.style.cssText='font-size:11px;padding:3px 10px;background:var(--ac);color:#fff;border:none;border-radius:20px;cursor:pointer;';aeb.textContent='+ 이벤트';
  aeb.addEventListener('click',function(){openEvModal({date:dfmt(cur)});});evb.appendChild(aeb);
  tbp.appendChild(evb);

  // Hour rows
  var scroll=mk('div','tbx-scroll');scroll.id='tbx-scroll';

  for(var h=0;h<24;h++){
    (function(hour){
      var row=mk('div','hr');row.style.minHeight=ROW+'px';
      var lbl=mk('div','hr-lbl');lbl.textContent=pad(hour)+':00';row.appendChild(lbl);

      var slot=mk('div','hr-slot');slot.dataset.hour=hour;slot.style.minHeight=ROW+'px';

      // Drag-drop on slot
      slot.addEventListener('dragover',function(e){e.preventDefault();e.dataTransfer.dropEffect='move';slot.classList.add('over');});
      slot.addEventListener('dragleave',function(e){if(!slot.contains(e.relatedTarget))slot.classList.remove('over');});
      slot.addEventListener('drop',function(e){
        e.preventDefault();slot.classList.remove('over');
        var id=e.dataTransfer.getData('text/plain');
        if(!id&&dragItem)id=dragItem;
        if(!id)return;
        var k=dk(cur);
        if(!timeline[k])timeline[k]=[];
        if(timeline[k].some(function(b){return b.id===id;}))return;
        timeline[k].push({id:id,hour:hour,dur:1});
        var t=tasks.find(function(x){return x.id===id;});
        if(t)t.placed=true;
        dragItem=null;dragType=null;save();renderDay();
      });

      // Render blocks at this hour
      blocks.filter(function(b){return b.hour===hour;}).forEach(function(b){
        var t=tasks.find(function(x){return x.id===b.id;});if(!t)return;
        var blk=mk('div','tblock');
        blk.style.cssText='background:'+t.color+'15;border:1.5px solid '+t.color+'55;min-height:'+(b.dur*ROW-10)+'px;';

        // Top row
        var tr=mk('div','tblock-top');
        var dot2=mk('div','cdot');dot2.style.background=t.color;
        var ttxt=mk('span');ttxt.style.cssText='flex:1;font-size:12px;font-weight:500;color:'+t.color+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';ttxt.textContent=t.text;
        var rm=mk('button','rm-btn');rm.style.color=t.color;rm.textContent='✕';
        rm.addEventListener('click',(function(bid){return function(){removeBlock(bid);};})(b.id));
        tr.appendChild(dot2);tr.appendChild(ttxt);tr.appendChild(rm);blk.appendChild(tr);

        // Bottom row
        var br=mk('div','tblock-bot');
        var tlbl=mk('span');tlbl.style.cssText='font-size:10px;color:'+t.color+';opacity:.8;';tlbl.textContent=pad(b.hour)+':00 — '+pad(b.hour+b.dur)+':00';
        var ctrl=mk('div','dur-ctrl');
        var btnSt='border:1px solid '+t.color+'44;background:'+t.color+'15;color:'+t.color+';';
        var mb=mk('button','dur-btn');mb.style.cssText=btnSt;mb.textContent='−';if(b.dur<=1)mb.disabled=true;
        mb.addEventListener('click',(function(bid){return function(){changeDur(bid,-1);};})(b.id));
        var dl=mk('span');dl.style.cssText='font-size:11px;color:'+t.color+';min-width:26px;text-align:center;font-weight:500;';dl.textContent=b.dur+'h';
        var pb=mk('button','dur-btn');pb.style.cssText=btnSt;pb.textContent='+';if(b.hour+b.dur>=24)pb.disabled=true;
        pb.addEventListener('click',(function(bid){return function(){changeDur(bid,1);};})(b.id));
        ctrl.appendChild(mb);ctrl.appendChild(dl);ctrl.appendChild(pb);
        br.appendChild(tlbl);br.appendChild(ctrl);blk.appendChild(br);
        slot.appendChild(blk);
      });

      row.appendChild(slot);scroll.appendChild(row);
    })(h);
  }
  tbp.appendChild(scroll);dv.appendChild(tbp);ct.appendChild(dv);
  setTimeout(function(){var s=document.getElementById('tbx-scroll');if(s)s.scrollTop=5*ROW;},30);
}

function mk(tag,cls){var el=document.createElement(tag);if(cls)el.className=cls;return el;}

function doAddTask(){
  var inp=document.getElementById('tp-inp');
  if(!inp){console.warn('tp-inp not found');return;}
  var text=inp.value.trim();
  if(!text)return;
  var color=TASK_COLORS[tcIdx%TASK_COLORS.length];tcIdx++;
  tasks.push({id:'t'+(++tid),text:text,color:color,placed:false});
  inp.value='';
  save();renderDay();
  // re-focus input after re-render
  setTimeout(function(){var ni=document.getElementById('tp-inp');if(ni)ni.focus();},50);
}

// keep global addTask pointing to doAddTask (for any inline calls)
function addTask(){doAddTask();}

function removeBlock(id){
  var key=dk(cur);
  timeline[key]=(timeline[key]||[]).filter(function(b){return b.id!==id;});
  var t=tasks.find(function(x){return x.id===id;});if(t)t.placed=false;
  save();renderDay();
}
function changeDur(id,delta){
  var key=dk(cur);
  var b=(timeline[key]||[]).find(function(x){return x.id===id;});if(!b)return;
  var nd=b.dur+delta;if(nd<1||b.hour+nd>24)return;
  b.dur=nd;save();renderDay();
}
function deleteTask(id){
  tasks=tasks.filter(function(x){return x.id!==id;});
  Object.keys(timeline).forEach(function(k){timeline[k]=(timeline[k]||[]).filter(function(b){return b.id!==id;});});
  save();renderDay();
}

// ── BOOT ──────────────────────────────────────────────────────────
window.addEventListener('load',function(){
  // Try Supabase (loaded after this script)
  if(typeof supabase!=='undefined'){
    initSB();
  } else {
    // Supabase SDK not yet loaded — use local
    loadLocal();
    if(!tasks.length)initSample();
    render();
    syncLbl('로컬 저장','#6e6e73');
  }
});

// Fallback render while Supabase loads
loadLocal();
if(!tasks.length)initSample();
render();
</script>
