<!-- PWA manifest (GitHub Pages용: 파일과 같은 폴더에 manifest.json 업로드 필요) -->
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
:root{--bg:#fff;--bg2:#f5f5f7;--bg3:#e8e8ed;--tx:#1d1d1f;--tx2:#6e6e73;--tx3:#98989d;--bd:#d2d2d7;--bd2:#c7c7cc;--ac:#534AB7;--ac2:#3C3489;--r:8px;}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--tx:#f2f2f7;--tx2:#aeaeb2;--tx3:#636366;--bd:#38383a;--bd2:#48484a;}}
html,body{height:100%;overflow:hidden;}
#app{display:flex;flex-direction:column;height:100vh;}

/* ── topbar ── */
#topbar{display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--bd);flex-shrink:0;}
.app-icon{width:24px;height:24px;background:var(--ac);border-radius:6px;color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#cal-title{font-size:14px;font-weight:500;color:var(--tx);flex:1;}
.vbtns{display:flex;gap:2px;background:var(--bg3);border-radius:var(--r);padding:2px;}
.vbtn{padding:4px 9px;font-size:11px;border:none;background:none;cursor:pointer;border-radius:6px;color:var(--tx2);}
.vbtn.on{background:var(--bg);color:var(--tx);font-weight:500;}
.tbtn{padding:4px 9px;font-size:12px;border:1px solid var(--bd2);border-radius:var(--r);background:var(--bg);cursor:pointer;color:var(--tx2);}
.today-btn{background:var(--ac);color:#fff;border-color:var(--ac);}
.navbtn{padding:3px 7px;font-size:16px;background:none;border:none;cursor:pointer;color:var(--tx2);}
#sync-lbl{font-size:11px;color:var(--tx3);min-width:60px;text-align:right;}

/* ── goal panel ── */
#gp{background:var(--bg);border-bottom:1px solid var(--bd);flex-shrink:0;}
.gp-hdr{display:flex;align-items:center;gap:6px;padding:4px 12px;border-bottom:1px solid var(--bd);}
.gp-lbl{font-size:10px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;flex:1;}
.ztb{padding:2px 8px;font-size:10px;border-radius:20px;border:1px solid var(--bd2);background:var(--bg);cursor:pointer;color:var(--tx2);}
.ztb.on{color:#fff;border-color:transparent;}
.ztb[data-z=mission].on{background:#534AB7;}.ztb[data-z=life].on{background:#0F6E56;}
.ztb[data-z=yearly].on{background:#BA7517;}.ztb[data-z=monthly].on{background:#185FA5;}.ztb[data-z=weekly].on{background:#993C1D;}
.g-rows{display:flex;gap:5px;padding:5px 12px;overflow-x:auto;}
.glane{min-width:110px;flex:1;background:var(--bg2);border-radius:var(--r);overflow:hidden;border:1px solid var(--bd);}
.glane.hidden{display:none;}
.gl-hdr{padding:3px 6px;font-size:10px;font-weight:500;display:flex;align-items:center;justify-content:space-between;}
.gl-hdr[data-z=mission]{background:#EEEDFE;color:#3C3489;}.gl-hdr[data-z=life]{background:#E1F5EE;color:#085041;}
.gl-hdr[data-z=yearly]{background:#FAEEDA;color:#633806;}.gl-hdr[data-z=monthly]{background:#E6F1FB;color:#0C447C;}.gl-hdr[data-z=weekly]{background:#FAECE7;color:#712B13;}
.gl-addbtn{background:none;border:none;cursor:pointer;font-size:14px;opacity:.6;line-height:1;color:inherit;}
.gl-items{padding:3px;display:flex;flex-direction:column;gap:2px;min-height:24px;}
.gl-item{padding:2px 5px;font-size:11px;background:var(--bg);border-radius:3px;border:1px solid var(--bd);cursor:grab;display:flex;align-items:center;gap:3px;user-select:none;}
.gl-item.dragging{opacity:.3;}.gl-item span{flex:1;color:var(--tx);}
.gl-del{background:none;border:none;cursor:pointer;font-size:10px;opacity:0;color:var(--tx2);}
.gl-item:hover .gl-del{opacity:.7;}
.gl-inp{width:100%;padding:2px 5px;font-size:11px;border:none;background:var(--bg);color:var(--tx);outline:none;border-radius:3px;}
.gdz.over{background:rgba(83,74,183,.12);}

/* ── main ── */
#main{display:flex;flex:1;overflow:hidden;min-height:0;}
#sidebar{width:190px;flex-shrink:0;border-right:1px solid var(--bd);display:flex;flex-direction:column;background:var(--bg2);}
.mini-cal{padding:8px 9px;}
.mini-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.mini-title{font-size:11px;font-weight:500;color:var(--tx);}
.mini-nav{background:none;border:none;cursor:pointer;font-size:12px;color:var(--tx2);padding:1px 3px;}
.mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
.mini-dh{font-size:9px;color:var(--tx3);text-align:center;padding:2px 0;}
.mini-d{font-size:10px;text-align:center;border-radius:50%;cursor:pointer;color:var(--tx2);width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin:auto;}
.mini-d:hover{background:var(--bg);}.mini-d.tod{background:var(--ac);color:#fff;}.mini-d.sel{background:rgba(83,74,183,.15);color:var(--ac);font-weight:500;}.mini-d.om{opacity:.28;}.mini-d.hol{color:#E24B4A;}
.sb-sec{padding:5px 9px;border-top:1px solid var(--bd);}
.sb-ttl{font-size:10px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.cal-item{display:flex;align-items:center;gap:6px;padding:2px 0;font-size:11px;color:var(--tx2);cursor:pointer;}
.cal-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.cal-item.off .cal-dot{opacity:.3;}.cal-item.off span{opacity:.35;}
#content{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0;}

/* ── month ── */
.mv{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.mv-dow{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--bd);flex-shrink:0;}
.mv-dow div{font-size:10px;color:var(--tx2);text-align:center;padding:4px 0;}
.mv-dow div:first-child{color:#E24B4A;}.mv-dow div:last-child{color:#185FA5;}

function getHol(d){var y=d.getFullYear();if(!hcache[y])hcache[y]=bHol(y);return hcache[y][y+'-'+(d.getMonth()+1)+'-'+d.getDate()]||null;}

function initSB(){try{sbClient=supabase.createClient(SB_URL,SB_KEY);sbReady=true;sl('연결중...','#BA7517');loadSB();sbClient.channel('mp').on('postgres_changes',{event:'UPDATE',schema:'public',table:SB_TBL},function(p){if(p.new&&p.new.payload){applyData(p.new.payload);render();sl('✓ sync','#0F6E56');}}).subscribe();}catch(ex){sbReady=false;sl('로컬','#6e6e73');}}

ype="button" onclick="closeMod()">취소</button><button class="mbtn pri" type="button" onclick="saveEv('+(o.id?'\''+o.id+'\'':'null')+')">저장</button></div></div></div>';document.getElementById('ov').addEventListener('click',function(e){if(e.target===this)closeMod();});setTimeout(function(){var el=document.getElementById('ev-t');if(el)el.focus();},30);}

// ═══ DAILY ═══════════════
function renderDay(){
  var key=dk(cur);
  var dtasks=getDT(key);
  var tl=getTL(key);
  var placedIds=tl.map(function(b){return b.id;});
  var rem=dtasks.filter(function(t){return placedIds.indexOf(t.id)===-1;}).length;
  var dn=['일','월','화','수','목','금','토'];

  var dv=mk('div','dv');

  // ═══ LEFT PANEL (아이디어 + 오늘의 할 일) ═══
  var lp=mk('div','left-panel');

  // header
  var lph=mk('div','left-panel-hdr');
  lph.innerHTML='<span>목록</span><span class="left-panel-cnt" id="lp-cnt">'+rem+'/'+dtasks.length+'</span>';
  lp.appendChild(lph);

  // two-column row
  var twocols=mk('div','two-cols');

  // ── COL 1: 아이디어 (persistent) ──
  var idCol=mk('div','col-pane');
  var idHdr=mk('div','col-hdr');
  idHdr.textContent='아이디어';
  idCol.appendChild(idHdr);
  var idList=mk('div','col-list');
  idList.id='idea-list';
  buildIdeaChips(idList);
  idCol.appendChild(idList);
  var idAdd=mk('div','col-add');
  var idInp=mk('input');idInp.type='text';idInp.placeholder='아이디어...';idInp.autocomplete='off';
  idInp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();doAddIdea(idInp);}});
  var idBtn=mk('button');idBtn.type='button';idBtn.textContent='+';
  idBtn.addEventListener('click',function(){doAddIdea(idInp);});
  idAdd.appendChild(idInp);idAdd.appendChild(idBtn);idCol.appendChild(idAdd);
  twocols.appendChild(idCol);

  // ── COL 2: 오늘의 할 일 (daily) ──
  var dtCol=mk('div','col-pane');
  var dtHdr=mk('div','col-hdr');
  dtHdr.textContent='오늘의 할 일';
  dtCol.appendChild(dtHdr);
  var dtList=mk('div','col-list');
  dtList.id='task-list';
  buildTaskChips(dtList,dtasks,tl,key);
  dtCol.appendChild(dtList);
  var dtAdd=mk('div','col-add');
  var dtInp=mk('input');dtInp.type='text';dtInp.placeholder='할 일...';dtInp.autocomplete='off';
  dtInp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();doAddTask(dtInp,key);}});
  var dtBtn=mk('button');dtBtn.type='button';dtBtn.textContent='+';
  dtBtn.addEventListener('click',function(){doAddTask(dtInp,key);});
  dtAdd.appendChild(dtInp);dtAdd.appendChild(dtBtn);dtCol.appendChild(dtAdd);
  twocols.appendChild(dtCol);

  lp.appendChild(twocols);
  dv.appendChild(lp);

  // ═══ TIMEBOX PANEL ═══
  var tbp=mk('div','tbp');
  var tbh=mk('div','tbp-hdr');
  tbh.innerHTML='<span>타임박스</span><span class="tbp-date">'+cur.getFullYear()+'.'+(cur.getMonth()+1)+'.'+cur.getDate()+' ('+dn[cur.getDay()]+')</span>';
  tbp.appendChild(tbh);

  // Event pills
  var evb=mk('div','ev-bar');
  var dayEvs=(events[key]||[]).filter(function(ev){var c=CALS.find(function(x){return x.id===ev.calId;});return!c||c.on;});
  dayEvs.forEach(function(ev){
    var pill=mk('div','ev-pill');
    pill.style.cssText='background:'+ev.color+'18;color:'+ev.color+';';
    pill.textContent=pad(ev.hour)+':'+(ev.min?pad(ev.min):'00')+' '+ev.title;
    pill.addEventListener('click',function(){editEv(ev.id);});evb.appendChild(pill);
  });

function onDrop(dropMin,key){
  var type=DRAG.type,id=DRAG.id,off=DRAG.off;
  DRAG={type:null,id:null,off:0};
  if(!type||!id)return;
  var tl=getTL(key);
  if(type==='task'||type==='idea'){
    if(tl.some(function(b){return b.id===id;}))return;
    tl.push({id:id,startMin:dropMin,durMin:60});
  } else if(type==='block'){
    var ns=Math.max(0,Math.min(24*60-15,Math.round((dropMin-off)/5)*5));
    var b=tl.find(function(x){return x.id===id;});if(b)b.startMin=ns;
  } else if(type==='event'){
    var ns=Math.max(0,Math.min(24*60-15,Math.round((dropMin-off)/5)*5));
    var ev=(events[key]||[]).find(function(x){return x.id===id;});
    if(ev){ev.hour=Math.floor(ns/60);ev.min=ns%60;}
  }
  save();renderBlocks(key);refreshLists(key);
}

function renderBlocks(key){
  document.querySelectorAll('.hr-body .tblock,.hr-body .ev-block').forEach(function(el){el.remove();});
  var tl=getTL(key);
  var dtasks=getDT(key);

  tl.forEach(function(b){
    // find in daily tasks OR ideas
    var t=dtasks.find(function(x){return x.id===b.id;})||ideas.find(function(x){return x.id===b.id;});
    if(!t)return;
    var sh=Math.floor(b.startMin/60),sm=b.startMin%60;
    var body=document.querySelector('.hr-body[data-hour="'+sh+'"]');if(!body)return;
    var topPx=sm/60*HPH;
    var htPx=Math.max(b.durMin/60*HPH,28);
    var blk=mk('div','tblock');
    blk.style.cssText='top:'+topPx+'px;height:'+htPx+'px;background:'+t.color+'18;border:1.5px solid '+t.color+'66;';
    blk.draggable=true;
    blk.addEventListener('dragstart',function(e){
      var rect=blk.getBoundingClientRect();
      DRAG={type:'block',id:b.id,off:Math.round((e.clientY-rect.top)/HPH*60/5)*5};
      e.dataTransfer.setData('text/plain','block');
      e.dataTransfer.effectAllowed='move';
      setTimeout(function(){blk.style.opacity='.3';},0);
    });
    blk.addEventListener('dragend',function(){blk.style.opacity='1';});
    var row=mk('div','tblock-row');
    var dot=mk('div','cdot');dot.style.background=t.color;
    var ttx=mk('span');ttx.style.cssText='flex:1;font-size:11px;font-weight:500;color:'+t.color+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';ttx.textContent=t.text;
    var rm=mk('button');rm.type='button';rm.className='rm-btn';rm.style.color=t.color;rm.textContent='✕';
    rm.addEventListener('click',function(e){e.stopPropagation();timeline[key]=(timeline[key]||[]).filter(function(x){return x.id!==b.id;});save();renderBlocks(key);refreshLists(key);});
    row.appendChild(dot);row.appendChild(ttx);row.appendChild(rm);blk.appendChild(row);
    if(htPx>=44){
      var bot=mk('div','tblock-bot');
      var tlbl=mk('span');tlbl.style.cssText='flex:1;font-size:10px;color:'+t.color+';opacity:.8;';tlbl.textContent=mstr(b.startMin)+' — '+mstr(b.startMin+b.durMin);
      var ctrl=mk('div','dur-ctrl');
      var bs='background:'+t.color+'18;color:'+t.color+';border:1px solid '+t.color+'44;';
      var mb=mk('button');mb.type='button';mb.className='dur-btn';mb.style.cssText=bs;mb.textContent='−';if(b.durMin<=15)mb.disabled=true;
      mb.addEventListener('click',function(e){e.stopPropagation();if(b.durMin>15){b.durMin-=15;save();renderBlocks(key);}});
      var dl=mk('span');dl.style.cssText='font-size:10px;color:'+t.color+';min-width:30px;text-align:center;font-weight:500;';var hh=Math.floor(b.durMin/60),mm=b.durMin%60;dl.textContent=hh>0?(mm>0?hh+'h'+mm+'m':hh+'h'):mm+'m';
      var pb=mk('button');pb.type='button';pb.className='dur-btn';pb.style.cssText=bs;pb.textContent='+';if(b.startMin+b.durMin>=24*60)pb.disabled=true;
      pb.addEventListener('click',function(e){e.stopPropagation();if(b.startMin+b.durMin<24*60){b.durMin+=15;save();renderBlocks(key);}});
      ctrl.appendChild(mb);ctrl.appendChild(dl);ctrl.appendChild(pb);bot.appendChild(tlbl);bot.appendChild(ctrl);blk.appendChild(bot);
    }
    body.appendChild(blk);
  });

  // event blocks
  var dayEvs=(events[key]||[]).filter(function(ev){var c=CALS.find(function(x){return x.id===ev.calId;});return!c||c.on;});
  dayEvs.forEach(function(ev){
    var sm=(ev.hour||0)*60+(ev.min||0);var dm=ev.durMin||60;
    var sh=Math.floor(sm/60);var body=document.querySelector('.hr-body[data-hour="'+sh+'"]');if(!body)return;
    var topPx=(sm%60)/60*HPH;var htPx=Math.max(dm/60*HPH,24);
    var blk=mk('div','ev-block');
    blk.style.cssText='top:'+topPx+'px;height:'+htPx+'px;background:'+ev.color+'18;border-left-color:'+ev.color+';';
    blk.draggable=true;
    blk.addEventListener('dragstart',function(e){
      var rect=blk.getBoundingClientRect();
      DRAG={type:'event',id:ev.id,off:Math.round((e.clientY-rect.top)/HPH*60/5)*5};
      e.dataTransfer.setData('text/plain','event');e.dataTransfer.effectAllowed='move';
      setTimeout(function(){blk.style.opacity='.35';},0);
    });
    blk.addEventListener('dragend',function(){blk.style.opacity='1';});
    blk.addEventListener('click',function(e){e.stopPropagation();editEv(ev.id);});
    blk.innerHTML='<div style="font-size:11px;font-weight:500;color:'+ev.color+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+esc(ev.title)+'</div>';
    if(htPx>=36)blk.innerHTML+='<div style="font-size:10px;color:'+ev.color+';opacity:.75;">'+mstr(sm)+' — '+mstr(sm+dm)+'</div>';
    body.appendChild(blk);
  });
}

function buildIdeaChips(container){
  container.innerHTML='';
  ideas.forEach(function(idea){
    var chip=mk('div','chip draggable');
    var dot=mk('div','cdot');dot.style.background=idea.color;
    var txt=mk('span');txt.textContent=idea.text;
    var del=mk('button','chip-del');del.type='button';del.textContent='✕';
    del.addEventListener('click',function(e){e.stopPropagation();ideas=ideas.filter(function(x){return x.id!==idea.id;});save();buildIdeaChips(document.getElementById('idea-list'));});
    chip.appendChild(dot);chip.appendChild(txt);chip.appendChild(del);
    chip.draggable=true;
    chip.addEventListener('dragstart',function(e){
      DRAG={type:'idea',id:idea.id,off:0};
      e.dataTransfer.setData('text/plain','idea');
      e.dataTransfer.effectAllowed='move';
      setTimeout(function(){chip.classList.add('dragging');},0);
    });
    chip.addEventListener('dragend',function(){chip.classList.remove('dragging');});
    container.appendChild(chip);
  });
}

function buildTaskChips(container,dtasks,tl,key){
  container.innerHTML='';
  var placedIds=tl.map(function(b){return b.id;});
  dtasks.forEach(function(t){
    var placed=placedIds.indexOf(t.id)!==-1;
    var chip=mk('div','chip '+(placed?'placed':'draggable'));
    chip.draggable=!placed;
    var dot=mk('div','cdot');dot.style.background=t.color;
    var txt=mk('span');txt.textContent=t.text;
    chip.appendChild(dot);chip.appendChild(txt);
    if(!placed){
      var del=mk('button','chip-del');del.type='button';del.textContent='✕';
      del.addEventListener('click',function(e){e.stopPropagation();dailyTasks[key]=(dailyTasks[key]||[]).filter(function(x){return x.id!==t.id;});timeline[key]=(timeline[key]||[]).filter(function(b){return b.id!==t.id;});save();refreshLists(key);renderBlocks(key);});
      chip.appendChild(del);
      chip.addEventListener('dragstart',function(e){
        DRAG={type:'task',id:t.id,off:0};
        e.dataTransfer.setData('text/plain','task');
        e.dataTransfer.effectAllowed='move';
        setTimeout(function(){chip.classList.add('dragging');},0);
      });
      chip.addEventListener('dragend',function(){chip.classList.remove('dragging');});
    }
    container.appendChild(chip);
  });
}

function refreshLists(key){
  var dtasks=getDT(key);var tl=getTL(key);
  var list=document.getElementById('task-list');if(list)buildTaskChips(list,dtasks,tl,key);
  var ilist=document.getElementById('idea-list');if(ilist)buildIdeaChips(ilist);
  var placedIds=tl.map(function(b){return b.id;});
  var rem=dtasks.filter(function(t){return placedIds.indexOf(t.id)===-1;}).length;
  var cnt=document.getElementById('lp-cnt');if(cnt)cnt.textContent=rem+'/'+dtasks.length;
}

function doAddIdea(inp){if(!inp)return;var text=inp.value.trim();if(!text)return;var color=TC[tcIdx%TC.length];tcIdx++;ideas.push({id:'i'+(++tid),text:text,color:color});inp.value='';inp.focus();save();var list=document.getElementById('idea-list');if(list)buildIdeaChips(list);}
function doAddTask(inp,key){if(!inp)return;var text=inp.value.trim();if(!text)return;var color=TC[tcIdx%TC.length];tcIdx++;getDT(key).push({id:'t'+(++tid),text:text,color:color});inp.value='';inp.focus();save();refreshLists(key);}

// ═══ BOOT ════════════════
loadLocal();
if(!ideas.length&&!Object.keys(dailyTasks).length)initSample();
render();
</script>
