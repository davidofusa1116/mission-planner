.gl-hdr[data-z=yearly]{background:#FAEEDA;color:#633806;}.gl-hdr[data-z=monthly]{background:#E6F1FB;color:#0C447C;}.gl-hdr[data-z=weekly]{background:#FAECE7;color:#712B13;}

.gdz{min-height:24px;}.gdz.over{background:rgba(83,74,183,.12);}
#main{display:flex;flex:1;overflow:hidden;min-height:0;}

.col-pane:last-child{border-right:none;}

.col-add button:hover{background:var(--ac2);}
.chip{padding:5px 7px;font-size:11px;border-radius:var(--r);border:1px solid var(--bd);background:var(--bg2);display:flex;align-items:center;gap:4px;margin-bottom:3px;user-select:none;}

.hr-body{flex:1;position:relative;background:var(--bg);overflow:visible;}
.hr-body.over{background:rgba(83,74,183,.06);}
.tblock{position:absolute;left:2px;right:2px;border-radius:6px;padding:4px 7px;cursor:move;z-index:10;box-shadow:0 1px 4px rgba(0,0,0,.1);}
.tblock-row{display:flex;align-items:center;gap:4px;}
.tblock-note{font-size:10px;opacity:.75;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tblock-bot{display:flex;align-items:center;gap:4px;margin-top:2px;}

.edit-btn{background:none;border:none;cursor:pointer;font-size:11px;opacity:.5;padding:0 2px;flex-shrink:0;}
.edit-btn:hover{opacity:1;}
.ev-block{position:absolute;left:2px;right:2px;border-radius:6px;padding:3px 7px;cursor:pointer;z-index:9;border-left:3px solid;}
/* modal */
#modal-root{position:fixed;inset:0;z-index:9999;pointer-events:none;}
#modal-root:not(:empty){pointer-events:all;}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;}
.modal{background:var(--bg);border-radius:12px;padding:20px;width:320px;border:1px solid var(--bd);box-shadow:0 20px 60px rgba(0,0,0,.3);}

.modal input[type=text],.modal input[type=date],.modal select,.modal textarea{width:100%;padding:6px 8px;font-size:12px;border:1px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--tx);outline:none;}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--ac);}
.modal textarea{resize:vertical;min-height:60px;}
.modal-btns{display:flex;gap:6px;margin-top:12px;justify-content:flex-end;}
.mbtn{padding:6px 13px;font-size:12px;border-radius:var(--r);cursor:pointer;border:1px solid var(--bd2);background:var(--bg);color:var(--tx2);}
.mbtn:hover{background:var(--bg2);}.mbtn.pri{background:var(--ac);color:#fff;border-color:var(--ac);}.mbtn.pri:hover{background:var(--ac2);}.mbtn.del{color:#E24B4A;border-color:rgba(226,75,74,.3);}

.cpick{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;}.cpick.sel{border-color:var(--tx);}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px;}
</style>

function renderGoals(){
  var rows=document.getElementById('goal-rows');rows.innerHTML='';

  var labels={mission:'사명선언',life:'인생목표',yearly:'연간목표',monthly:'월간목표',weekly:'주간목표'};
  zones.forEach(function(z){
    var lane=mk('div','glane'+(zVis[z]?'':' hidden'));

    var sp=mk('span');sp.textContent=labels[z];hdr.appendChild(sp);

    ab.addEventListener('click',function(){addGoal(z);});hdr.appendChild(ab);lane.appendChild(hdr);
    var items=mk('div','gl-items gdz');items.id='gl-'+z;

    items.addEventListener('dragover',function(e){e.preventDefault();items.classList.add('over');});
    items.addEventListener('dragleave',function(){items.classList.remove('over');});
    items.addEventListener('drop',function(e){
      e.preventDefault();items.classList.remove('over');
      if(DRAG.type==='goal'&&dragGoalId){
        if(dragGoalZ===z)return;
        var item=goals[dragGoalZ].find(function(g){return g.id===dragGoalId;});
        if(!item)return;
        goals[dragGoalZ]=goals[dragGoalZ].filter(function(g){return g.id!==dragGoalId;});
        goals[z].push(item);dragGoalId=null;save();renderGoals();
      } else if(DRAG.type==='idea'&&DRAG.text){
        // Copy idea text into this goal zone
        goals[z].push({id:'g'+(++gid),text:DRAG.text});save();renderGoals();
      } else if(DRAG.type==='task'&&DRAG.text){
        goals[z].push({id:'g'+(++gid),text:DRAG.text});save();renderGoals();
      }
    });
    goals[z].forEach(function(g){
      var d=mk('div','gl-item');d.draggable=true;

      var dl=mk('button','gl-del');dl.type='button';dl.textContent='✕';
      dl.addEventListener('click',function(e){e.stopPropagation();goals[z]=goals[z].filter(function(x){return x.id!==g.id;});save();renderGoals();});
      d.appendChild(s);d.appendChild(dl);
      d.addEventListener('dragstart',function(e){
        DRAG={type:'goal',id:g.id,off:0,zone:z,text:g.text,color:null};
        dragGoalZ=z;dragGoalId=g.id;
        e.dataTransfer.setData('text/plain','goal');
        setTimeout(function(){d.classList.add('dragging');},0);
      });
      d.addEventListener('dragend',function(){d.classList.remove('dragging');dragGoalId=null;});
      items.appendChild(d);
    });
    lane.appendChild(items);rows.appendChild(lane);
  });
}

  var picks=EVC.map(function(c){return '<div class="cpick'+(c===idea.color?' sel':'')+'" style="background:'+c+';width:26px;height:26px;" onclick="pickIdeaCol(\''+c+'\')" data-c="'+c+'"></div>';}).join('');
  document.getElementById('modal-root').innerHTML=
    '<div class="overlay" id="ov"><div class="modal"><h3>아이디어 수정</h3>'+
    '<label>내용</label><input type="text" id="idea-txt" value="'+esc(idea.text)+'" placeholder="아이디어...">'+
    '<label>색상</label><div class="cpicks" style="margin-top:6px;">'+picks+'</div>'+
    '<div class="modal-btns">'+
    '<button class="mbtn del" type="button" onclick="deleteIdea(\''+ideaId+'\')">삭제</button>'+
    '<button class="mbtn" type="button" onclick="closeMod()">취소</button>'+
    '<button class="mbtn pri" type="button" onclick="saveIdea(\''+ideaId+'\')">저장</button>'+
    '</div></div></div>';
  document.getElementById('ov').addEventListener('click',function(e){if(e.target===this)closeMod();});
  setTimeout(function(){var el=document.getElementById('idea-txt');if(el)el.focus();},30);
}
var _ideaSc='';
function pickIdeaCol(c){_ideaSc=c;document.querySelectorAll('#modal-root .cpick').forEach(function(el){el.classList.toggle('sel',el.dataset.c===c);});}
function saveIdea(ideaId){
  var idea=ideas.find(function(x){return x.id===ideaId;});if(!idea)return;
  var newTxt=document.getElementById('idea-txt').value.trim();
  if(newTxt)idea.text=newTxt;
  if(_ideaSc)idea.color=_ideaSc;
  _ideaSc='';save();closeMod();
  var list=document.getElementById('idea-list');if(list)buildIdeaChips(list);
  renderBlocks(dk(cur));
}
function deleteIdea(ideaId){
  ideas=ideas.filter(function(x){return x.id!==ideaId;});
  Object.keys(timeline).forEach(function(k){timeline[k]=(timeline[k]||[]).filter(function(b){return b.id!==ideaId;});});
  save();closeMod();
  var list=document.getElementById('idea-list');if(list)buildIdeaChips(list);
  renderBlocks(dk(cur));refreshLists(dk(cur));
}

// ── RENDER ──
function renderContent(){if(view==='month')renderMonth();else if(view==='week')renderWeek();else renderDay();}
function render(){setTitle();renderMini();renderGoals();renderCalList();renderContent();}

function renderMonth(){var html='<div class="mv"><div class="mv-dow">';['일','월','화','수','목','금','토'].forEach(function(d){html+='<div>'+d+'</div>';});html+='</div><div class="mv-grid">';var first=new Date(cur.getFullYear(),cur.getMonth(),1);var st=new Date(first);st.setDate(1-first.getDay());for(var i=0;i<42;i++){var d=new Date(st);d.setDate(st.getDate()+i);var dow=d.getDay();var om=d.getMonth()!==cur.getMonth();var hol=getHol(d);var nc='mc-n'+(isToday(d)?' tod':om?' om':hol?' hol':dow===0?' sun':dow===6?' sat':'');html+='<div class="mc" onclick="goDay('+d.getFullYear()+','+d.getMonth()+','+d.getDate()+')" ondblclick="event.stopPropagation();openEvModal({date:\''+dfmt(d)+'\'})"><div class="'+nc+'" style="'+(om?'opacity:.3':'')+'">'+d.getDate()+'</div>';if(hol)html+='<div class="mc-hol">'+esc(hol)+'</div>';var key=dk(d);if(events[key]){var vis=events[key].filter(function(ev){var c=CALS.find(function(x){return x.id===ev.calId;});return!c||c.on;});vis.slice(0,2).forEach(function(ev){html+='<div class="mc-ev" style="background:'+ev.color+'20;color:'+ev.color+';" onclick="event.stopPropagation();editEv(\''+ev.id+'\')">'+esc(ev.title)+'</div>';});if(vis.length>2)html+='<div style="font-size:9px;color:var(--tx3);">+'+(vis.length-2)+'</div>';}html+='</div>';}html+='</div></div>';document.getElementById('content').innerHTML=html;}

function renderWeek(){var ws=new Date(cur);ws.setDate(cur.getDate()-cur.getDay());var dn=['일','월','화','수','목','금','토'];var html='<div class="wv"><div class="wv-hdr"><div class="wh-sp"></div>';for(var i=0;i<7;i++){var d=new Date(ws);d.setDate(ws.getDate()+i);var hol=getHol(d);html+='<div class="wh-day" onclick="goDay('+d.getFullYear()+','+d.getMonth()+','+d.getDate()+')"><div class="wh-dn" style="'+(hol||i===0?'color:#E24B4A':i===6?'color:#185FA5':'')+'">'+dn[i]+'</div><div class="wh-num'+(isToday(d)?' tod':'')+'">'+d.getDate()+'</div></div>';}html+='</div><div class="wv-body"><div class="wt-col">';for(var h=0;h<24;h++)html+='<div class="wt-h">'+(h===0?'':pad(h)+':00')+'</div>';html+='</div>';for(var i=0;i<7;i++){var d=new Date(ws);d.setDate(ws.getDate()+i);html+='<div class="we-col">';for(var h=0;h<24;h++)html+='<div class="we-slot" ondblclick="openEvModal({date:\''+dfmt(d)+'\',hour:'+h+'})"></div>';var key=dk(d);if(events[key])events[key].forEach(function(ev){var c=CALS.find(function(x){return x.id===ev.calId;});if(c&&!c.on)return;var tp=(ev.hour||0)*52;var ht=Math.max((ev.durMin||60)/60*52-4,20);html+='<div class="we-ev" style="top:'+tp+'px;height:'+ht+'px;background:'+ev.color+'1a;color:'+ev.color+';border-left-color:'+ev.color+';" onclick="editEv(\''+ev.id+'\')">'+pad(ev.hour)+':00 '+esc(ev.title)+'</div>';});html+='</div>';}html+='</div></div>';document.getElementById('content').innerHTML=html;setTimeout(function(){var s=document.querySelector('.wv-body');if(s)s.scrollTop=6*52;},30);}

function renderDay(){
  var key=dk(cur);
  var dtasks=getDT(key);
  var tl=getTL(key);
  var placedIds=tl.map(function(b){return b.id;});
  var rem=dtasks.filter(function(t){return placedIds.indexOf(t.id)===-1;}).length;
  var dn=['일','월','화','수','목','금','토'];
  var ct=document.getElementById('content');ct.innerHTML='';
  var dv=mk('div','dv');

  // LEFT PANEL
  var lp=mk('div','left-panel');
  var lph=mk('div','left-panel-hdr');
  lph.innerHTML='<span>목록</span><span class="left-panel-cnt" id="lp-cnt">'+rem+'/'+dtasks.length+'</span>';
  lp.appendChild(lph);
  var twocols=mk('div','two-cols');

  // COL 1: 아이디어
  var idCol=mk('div','col-pane');
  var idHdr=mk('div','col-hdr');idHdr.textContent='아이디어';idCol.appendChild(idHdr);
  var idList=mk('div','col-list');idList.id='idea-list';
  // idea list also accepts drops from goals/tasks
  idList.addEventListener('dragover',function(e){e.preventDefault();idList.classList.add('over');});
  idList.addEventListener('dragleave',function(){idList.classList.remove('over');});
  idList.addEventListener('drop',function(e){
    e.preventDefault();idList.classList.remove('over');
    if(DRAG.type==='goal'&&DRAG.text){ideas.push({id:'i'+(++tid),text:DRAG.text,color:TC[tcIdx%TC.length]});tcIdx++;save();buildIdeaChips(idList);}
    else if(DRAG.type==='task'&&DRAG.text){ideas.push({id:'i'+(++tid),text:DRAG.text,color:TC[tcIdx%TC.length]});tcIdx++;save();buildIdeaChips(idList);}
  });
  buildIdeaChips(idList);idCol.appendChild(idList);
  var idAdd=mk('div','col-add');
  var idInp=mk('input');idInp.type='text';idInp.placeholder='아이디어...';idInp.autocomplete='off';
  idInp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();doAddIdea(idInp);}});
  var idBtn=mk('button');idBtn.type='button';idBtn.textContent='+';
  idBtn.addEventListener('click',function(){doAddIdea(idInp);});
  idAdd.appendChild(idInp);idAdd.appendChild(idBtn);idCol.appendChild(idAdd);
  twocols.appendChild(idCol);

  // COL 2: 오늘의 할 일
  var dtCol=mk('div','col-pane');
  var dtHdr=mk('div','col-hdr');dtHdr.textContent='오늘의 할 일';dtCol.appendChild(dtHdr);
  var dtList=mk('div','col-list');dtList.id='task-list';
  // task list accepts drops from goals/ideas
  dtList.addEventListener('dragover',function(e){e.preventDefault();dtList.classList.add('over');});
  dtList.addEventListener('dragleave',function(){dtList.classList.remove('over');});
  dtList.addEventListener('drop',function(e){
    e.preventDefault();dtList.classList.remove('over');
    if((DRAG.type==='goal'||DRAG.type==='idea')&&DRAG.text){
      var color=DRAG.color||TC[tcIdx%TC.length];tcIdx++;
      getDT(key).push({id:'t'+(++tid),text:DRAG.text,color:color});
      save();refreshLists(key);
    }
  });
  buildTaskChips(dtList,dtasks,tl,key);dtCol.appendChild(dtList);
  var dtAdd=mk('div','col-add');
  var dtInp=mk('input');dtInp.type='text';dtInp.placeholder='할 일...';dtInp.autocomplete='off';
  dtInp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();doAddTask(dtInp,key);}});
  var dtBtn=mk('button');dtBtn.type='button';dtBtn.textContent='+';
  dtBtn.addEventListener('click',function(){doAddTask(dtInp,key);});
  dtAdd.appendChild(dtInp);dtAdd.appendChild(dtBtn);dtCol.appendChild(dtAdd);
  twocols.appendChild(dtCol);

  lp.appendChild(twocols);dv.appendChild(lp);

  // TIMEBOX
  var tbp=mk('div','tbp');
  var tbh=mk('div','tbp-hdr');
  tbh.innerHTML='<span>타임박스</span><span class="tbp-date">'+cur.getFullYear()+'.'+(cur.getMonth()+1)+'.'+cur.getDate()+' ('+dn[cur.getDay()]+')</span>';
  tbp.appendChild(tbh);
  var evb=mk('div','ev-bar');
  var dayEvs=(events[key]||[]).filter(function(ev){var c=CALS.find(function(x){return x.id===ev.calId;});return!c||c.on;});
  dayEvs.forEach(function(ev){var pill=mk('div','ev-pill');pill.style.cssText='background:'+ev.color+'18;color:'+ev.color+';';pill.textContent=pad(ev.hour)+':'+(ev.min?pad(ev.min):'00')+' '+ev.title;pill.addEventListener('click',function(){editEv(ev.id);});evb.appendChild(pill);});
  var aeb=mk('button');aeb.type='button';aeb.style.cssText='font-size:11px;padding:2px 8px;background:var(--ac);color:#fff;border:none;border-radius:20px;cursor:pointer;';aeb.textContent='+ 이벤트';aeb.addEventListener('click',function(){openEvModal({date:dfmt(cur)});});
  evb.appendChild(aeb);tbp.appendChild(evb);
  var outer=mk('div','tbx-outer');
  for(var h=0;h<24;h++){
    (function(hour){
      var hr=mk('div','hr');
      var lbl=mk('div','hr-lbl');lbl.textContent=hour===0?'':pad(hour)+':00';
      var body=mk('div','hr-body');body.dataset.hour=hour;
      body.addEventListener('dragover',function(e){e.preventDefault();e.stopPropagation();e.dataTransfer.dropEffect='move';body.classList.add('over');});
      body.addEventListener('dragleave',function(e){if(!body.contains(e.relatedTarget))body.classList.remove('over');});
      body.addEventListener('drop',function(e){
        e.preventDefault();e.stopPropagation();body.classList.remove('over');
        var rect=body.getBoundingClientRect();
        var relY=Math.max(0,e.clientY-rect.top);
        var minInHour=Math.min(55,Math.round(relY/HPH*60/5)*5);
        onDrop(hour*60+minInHour,key);
      });
      hr.appendChild(lbl);hr.appendChild(body);outer.appendChild(hr);
    })(h);
  }
  tbp.appendChild(outer);dv.appendChild(tbp);ct.appendChild(dv);
  renderBlocks(key);
  setTimeout(function(){outer.scrollTop=6*HPH;},10);
}

function onDrop(dropMin,key){
  var type=DRAG.type,id=DRAG.id,off=DRAG.off;
  DRAG={type:null,id:null,off:0,zone:null,text:null,color:null};
  if(!type||!id)return;
  var tl=getTL(key);
  if(type==='task'||type==='idea'){
    if(tl.some(function(b){return b.id===id;}))return;
    tl.push({id:id,startMin:dropMin,durMin:60,note:''});
  } else if(type==='block'){
    var ns=Math.max(0,Math.min(24*60-15,Math.round((dropMin-off)/5)*5));
    var b=tl.find(function(x){return x.id===id;});if(b)b.startMin=ns;
  } else if(type==='event'){
    var ns=Math.max(0,Math.min(24*60-15,Math.round((dropMin-off)/5)*5));
    var ev=(events[key]||[]).find(function(x){return x.id===id;});
    if(ev){ev.hour=Math.floor(ns/60);ev.min=ns%60;}
  }
  save();renderBlocks(key);refreshLists(key);
}

function renderBlocks(key){
  document.querySelectorAll('.hr-body .tblock,.hr-body .ev-block').forEach(function(el){el.remove();});
  var tl=getTL(key);
  var dtasks=getDT(key);
  tl.forEach(function(b){
    var t=dtasks.find(function(x){return x.id===b.id;})||ideas.find(function(x){return x.id===b.id;});
    if(!t)return;
    var sh=Math.floor(b.startMin/60),sm=b.startMin%60;
    var body=document.querySelector('.hr-body[data-hour="'+sh+'"]');if(!body)return;
    var topPx=sm/60*HPH;
    var htPx=Math.max(b.durMin/60*HPH,28);
    var blk=mk('div','tblock');
    blk.style.cssText='top:'+topPx+'px;height:'+htPx+'px;background:'+t.color+'18;border:1.5px solid '+t.color+'66;';
    blk.draggable=true;
    blk.addEventListener('dragstart',function(e){
      var rect=blk.getBoundingClientRect();
      DRAG={type:'block',id:b.id,off:Math.round((e.clientY-rect.top)/HPH*60/5)*5,zone:'timebox',text:t.text,color:t.color};
      e.dataTransfer.setData('text/plain','block');e.dataTransfer.effectAllowed='move';
      setTimeout(function(){blk.style.opacity='.3';},0);
    });
    blk.addEventListener('dragend',function(){blk.style.opacity='1';});

    var row=mk('div','tblock-row');
    var dot=mk('div','cdot');dot.style.background=t.color;
    var ttx=mk('span');ttx.style.cssText='flex:1;font-size:11px;font-weight:500;color:'+t.color+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';ttx.textContent=t.text;
    // 수정 버튼 (기능 2)
    var eb=mk('button');eb.type='button';eb.className='edit-btn';eb.style.color=t.color;eb.textContent='✎';eb.title='수정';
    eb.addEventListener('click',function(e){e.stopPropagation();openBlockModal(b.id,key);});
    var rm=mk('button');rm.type='button';rm.className='rm-btn';rm.style.color=t.color;rm.textContent='✕';
    rm.addEventListener('click',function(e){e.stopPropagation();timeline[key]=(timeline[key]||[]).filter(function(x){return x.id!==b.id;});save();renderBlocks(key);refreshLists(key);});
    row.appendChild(dot);row.appendChild(ttx);row.appendChild(eb);row.appendChild(rm);blk.appendChild(row);

    // 메모 표시
    if(b.note&&htPx>=36){var noteEl=mk('div','tblock-note');noteEl.style.color=t.color;noteEl.textContent=b.note;blk.appendChild(noteEl);}

    if(htPx>=44){
      var bot=mk('div','tblock-bot');
      var tlbl=mk('span');tlbl.style.cssText='flex:1;font-size:10px;color:'+t.color+';opacity:.8;';tlbl.textContent=mstr(b.startMin)+' — '+mstr(b.startMin+b.durMin);
      var ctrl=mk('div','dur-ctrl');
      var bs='background:'+t.color+'18;color:'+t.color+';border:1px solid '+t.color+'44;';
      var mb=mk('button');mb.type='button';mb.className='dur-btn';mb.style.cssText=bs;mb.textContent='−';if(b.durMin<=15)mb.disabled=true;
      mb.addEventListener('click',function(e){e.stopPropagation();if(b.durMin>15){b.durMin-=15;save();renderBlocks(key);}});
      var hh=Math.floor(b.durMin/60),mm=b.durMin%60;
      var dl=mk('span');dl.style.cssText='font-size:10px;color:'+t.color+';min-width:30px;text-align:center;font-weight:500;';dl.textContent=hh>0?(mm>0?hh+'h'+mm+'m':hh+'h'):mm+'m';
      var pb=mk('button');pb.type='button';pb.className='dur-btn';pb.style.cssText=bs;pb.textContent='+';if(b.startMin+b.durMin>=24*60)pb.disabled=true;
      pb.addEventListener('click',function(e){e.stopPropagation();if(b.startMin+b.durMin<24*60){b.durMin+=15;save();renderBlocks(key);}});
      ctrl.appendChild(mb);ctrl.appendChild(dl);ctrl.appendChild(pb);bot.appendChild(tlbl);bot.appendChild(ctrl);blk.appendChild(bot);
    }
    body.appendChild(blk);
  });

  // event blocks
  var dayEvs=(events[key]||[]).filter(function(ev){var c=CALS.find(function(x){return x.id===ev.calId;});return!c||c.on;});
  dayEvs.forEach(function(ev){
    var sm=(ev.hour||0)*60+(ev.min||0);var dm=ev.durMin||60;
    var sh=Math.floor(sm/60);var body=document.querySelector('.hr-body[data-hour="'+sh+'"]');if(!body)return;
    var topPx=(sm%60)/60*HPH;var htPx=Math.max(dm/60*HPH,24);
    var blk=mk('div','ev-block');
    blk.style.cssText='top:'+topPx+'px;height:'+htPx+'px;background:'+ev.color+'18;border-left-color:'+ev.color+';';
    blk.draggable=true;
    blk.addEventListener('dragstart',function(e){
      var rect=blk.getBoundingClientRect();
      DRAG={type:'event',id:ev.id,off:Math.round((e.clientY-rect.top)/HPH*60/5)*5,zone:'timebox',text:ev.title,color:ev.color};
      e.dataTransfer.setData('text/plain','event');e.dataTransfer.effectAllowed='move';
      setTimeout(function(){blk.style.opacity='.35';},0);
    });
    blk.addEventListener('dragend',function(){blk.style.opacity='1';});
    blk.addEventListener('click',function(e){e.stopPropagation();editEv(ev.id);});
    blk.innerHTML='<div style="font-size:11px;font-weight:500;color:'+ev.color+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+esc(ev.title)+'</div>';
    if(htPx>=36)blk.innerHTML+='<div style="font-size:10px;color:'+ev.color+';opacity:.75;">'+mstr(sm)+' — '+mstr(sm+dm)+'</div>';
    body.appendChild(blk);
  });
}

function buildIdeaChips(container){
  container.innerHTML='';
  ideas.forEach(function(idea){
    var chip=mk('div','chip draggable');
    var dot=mk('div','cdot');dot.style.background=idea.color;
    var txt=mk('span');txt.textContent=idea.text;
    // 수정 버튼 (색상 포함, 기능 3)
    var eb=mk('button','chip-del');eb.type='button';eb.title='수정/색상';eb.textContent='✎';eb.style.opacity='.5';
    eb.addEventListener('click',function(e){e.stopPropagation();_ideaSc=idea.color;openIdeaModal(idea.id);});
    chip.appendChild(dot);chip.appendChild(txt);chip.appendChild(eb);
    chip.draggable=true;
    chip.addEventListener('dragstart',function(e){
      DRAG={type:'idea',id:idea.id,off:0,zone:'idea',text:idea.text,color:idea.color};
      e.dataTransfer.setData('text/plain','idea');e.dataTransfer.effectAllowed='move';
      setTimeout(function(){chip.classList.add('dragging');},0);
    });
    chip.addEventListener('dragend',function(){chip.classList.remove('dragging');});
    container.appendChild(chip);
  });
}

function buildTaskChips(container,dtasks,tl,key){
  container.innerHTML='';
  var placedIds=tl.map(function(b){return b.id;});
  dtasks.forEach(function(t){
    var placed=placedIds.indexOf(t.id)!==-1;
    var chip=mk('div','chip '+(placed?'placed':'draggable'));
    chip.draggable=!placed;
    var dot=mk('div','cdot');dot.style.background=t.color;
    var txt=mk('span');txt.textContent=t.text;
    chip.appendChild(dot);chip.appendChild(txt);
    if(!placed){
      var del=mk('button','chip-del');del.type='button';del.textContent='✕';
      del.addEventListener('click',function(e){e.stopPropagation();dailyTasks[key]=(dailyTasks[key]||[]).filter(function(x){return x.id!==t.id;});timeline[key]=(timeline[key]||[]).filter(function(b){return b.id!==t.id;});save();refreshLists(key);renderBlocks(key);});
      chip.appendChild(del);
      chip.addEventListener('dragstart',function(e){
        DRAG={type:'task',id:t.id,off:0,zone:'task',text:t.text,color:t.color};
        e.dataTransfer.setData('text/plain','task');e.dataTransfer.effectAllowed='move';
        setTimeout(function(){chip.classList.add('dragging');},0);
      });
      chip.addEventListener('dragend',function(){chip.classList.remove('dragging');});
    }
    container.appendChild(chip);
  });
}

function refreshLists(key){
  var dtasks=getDT(key);var tl=getTL(key);
  var list=document.getElementById('task-list');if(list)buildTaskChips(list,dtasks,tl,key);
  var ilist=document.getElementById('idea-list');if(ilist)buildIdeaChips(ilist);
  var placedIds=tl.map(function(b){return b.id;});
  var rem=dtasks.filter(function(t){return placedIds.indexOf(t.id)===-1;}).length;
  var cnt=document.getElementById('lp-cnt');if(cnt)cnt.textContent=rem+'/'+dtasks.length;
}

function doAddIdea(inp){if(!inp)return;var text=inp.value.trim();if(!text)return;var color=TC[tcIdx%TC.length];tcIdx++;ideas.push({id:'i'+(++tid),text:text,color:color});inp.value='';inp.focus();save();var list=document.getElementById('idea-list');if(list)buildIdeaChips(list);}
function doAddTask(inp,key){if(!inp)return;var text=inp.value.trim();if(!text)return;var color=TC[tcIdx%TC.length];tcIdx++;getDT(key).push({id:'t'+(++tid),text:text,color:color});inp.value='';inp.focus();save();refreshLists(key);}

// BOOT
loadLocal();
if(!ideas.length&&!Object.keys(dailyTasks).length)initSample();
render();
</script>
